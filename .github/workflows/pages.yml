name: Deploy candidate campaigns to Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.pages-deployment-run'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Mark Pages deployment run
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' "$GITHUB_RUN_ID" > .pages-deployment-run
          git config user.name 'Candidate Campaign Publisher'
          git config user.email 'actions@users.noreply.github.com'
          git add .pages-deployment-run
          git commit -m 'Mark Pages deployment run'
          git push origin HEAD:main

      - name: Ensure GitHub Actions is the Pages source
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh api "repos/$GITHUB_REPOSITORY/pages" >/tmp/pages.json 2>/dev/null; then
            gh api --method PUT "repos/$GITHUB_REPOSITORY/pages" -f build_type=workflow >/tmp/pages-updated.json
          else
            gh api --method POST "repos/$GITHUB_REPOSITORY/pages" -f build_type=workflow >/tmp/pages-created.json
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static campaign tree
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
