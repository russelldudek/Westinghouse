name: Deploy candidate campaigns to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure GitHub Actions is the Pages source
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh api "repos/$GITHUB_REPOSITORY/pages" >/tmp/pages.json 2>/dev/null; then
            gh api --method PUT "repos/$GITHUB_REPOSITORY/pages" -f build_type=workflow >/tmp/pages-updated.json
          else
            gh api --method POST "repos/$GITHUB_REPOSITORY/pages" -f build_type=workflow >/tmp/pages-created.json
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static campaign tree
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
