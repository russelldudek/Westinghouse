name: Publish complete RoleForge campaign

on:
  push:
    paths:
      - '.github/workflows/publish-roleforge-campaign.yml'

permissions:
  contents: write

concurrency:
  group: westinghouse-roleforge-publication
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Publish workflow run reference
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'RoleForge Campaign Publisher'
          git config user.email 'actions@users.noreply.github.com'
          printf '%s\n' "$GITHUB_RUN_ID" > publish-run-id.txt
          git add publish-run-id.txt
          git commit -m 'Record active RoleForge publication run'
          git push origin HEAD:main

      - name: Restore checksum-verified campaign source
        shell: bash
        run: |
          set -euo pipefail
          cat .roleforge-payload/chunk-* > /tmp/westinghouse-source.b64
          echo 'b334aedfc173965e29301dd496fd2800de9d709b37a9724fa1694c18e9c40a26  /tmp/westinghouse-source.b64' | sha256sum -c -
          base64 --decode /tmp/westinghouse-source.b64 > /tmp/westinghouse-source.tgz
          echo '0b4d125d6e640b633eae54eb6df595d47cc071c10c1df6010db23ed316b9785e  /tmp/westinghouse-source.tgz' | sha256sum -c -
          tar -tzf /tmp/westinghouse-source.tgz
          tar -xzf /tmp/westinghouse-source.tgz -C .
          mkdir -p docs

      - name: Render final PDFs with runner Chrome
        shell: bash
        run: |
          set -euo pipefail
          command -v pdfinfo >/dev/null || { sudo apt-get update; sudo apt-get install -y poppler-utils; }
          BROWSER=$(command -v google-chrome || command -v chromium || command -v chromium-browser || true)
          if [ -z "$BROWSER" ]; then
            sudo apt-get update
            sudo apt-get install -y chromium-browser
            BROWSER=$(command -v chromium-browser || command -v chromium)
          fi
          python3 -m http.server 8765 --bind 127.0.0.1 >/tmp/roleforge-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID || true' EXIT
          sleep 2
          render() {
            local html="$1" pdf="$2"
            "$BROWSER" --headless --no-sandbox --disable-gpu --hide-scrollbars \
              --no-pdf-header-footer --virtual-time-budget=3000 \
              --print-to-pdf="$pdf" "http://127.0.0.1:8765/$html"
            test -s "$pdf"
          }
          render resume.html docs/russell-dudek-westinghouse-opx-chief-of-staff-resume.pdf
          render cover-letter.html docs/russell-dudek-westinghouse-opx-chief-of-staff-cover-letter.pdf
          render interview-brief.html docs/russell-dudek-westinghouse-opx-chief-of-staff-interview-brief.pdf
          render 120-day-plan.html docs/russell-dudek-westinghouse-opx-chief-of-staff-120-day-plan.pdf

      - name: Verify document contracts
        shell: bash
        run: |
          set -euo pipefail
          check_pages() {
            local file="$1" expected="$2"
            actual=$(pdfinfo "$file" | awk '/^Pages:/ {print $2}')
            echo "$file: $actual pages"
            test "$actual" = "$expected"
          }
          check_pages docs/russell-dudek-westinghouse-opx-chief-of-staff-resume.pdf 2
          check_pages docs/russell-dudek-westinghouse-opx-chief-of-staff-cover-letter.pdf 1
          check_pages docs/russell-dudek-westinghouse-opx-chief-of-staff-interview-brief.pdf 4
          check_pages docs/russell-dudek-westinghouse-opx-chief-of-staff-120-day-plan.pdf 3

      - name: Finalize clean main-branch manifest
        shell: bash
        run: |
          set -euo pipefail
          printf 'ROLEFORGE-WESTINGHOUSE-PUBLICATION-RUN-%s\n' "$GITHUB_RUN_ID" > deployment-proof.txt
          rm -f resume.pdf cover-letter.pdf alignment.css publish-run-id.txt payload-diagnostic.txt
          rm -rf .roleforge-payload
          rm -f .github/workflows/fetch-brand-assets.yml
          rm -f .github/workflows/diagnose-roleforge-payload.yml
          rm -f .github/workflows/publish-roleforge-campaign.yml
          git pull --rebase origin main
          git add -A
          git commit -m 'Publish complete Westinghouse RoleForge campaign'
          git push origin HEAD:main
