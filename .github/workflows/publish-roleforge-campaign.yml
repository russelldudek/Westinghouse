name: Publish complete RoleForge campaign

on:
  push:
    paths:
      - '.github/workflows/publish-roleforge-campaign.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Restore audited campaign source
        shell: bash
        run: |
          set -euo pipefail
          cat .roleforge-payload/chunk-* | base64 --decode > /tmp/westinghouse-source.tgz
          tar -xzf /tmp/westinghouse-source.tgz -C .
          mkdir -p docs

      - name: Install PDF rendering dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          mkdir -p /tmp/roleforge-render
          cd /tmp/roleforge-render
          npm init -y >/dev/null 2>&1
          npm install playwright@1.52.0 >/dev/null 2>&1
          npx playwright install --with-deps chromium

      - name: Generate final PDFs from committed HTML
        shell: bash
        run: |
          set -euo pipefail
          python3 -m http.server 8765 --bind 127.0.0.1 >/tmp/roleforge-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID || true' EXIT
          sleep 2
          cat > /tmp/roleforge-render/render.js <<'NODE'
          const { chromium } = require('/tmp/roleforge-render/node_modules/playwright');
          const jobs = [
            ['resume.html', 'docs/russell-dudek-westinghouse-opx-chief-of-staff-resume.pdf'],
            ['cover-letter.html', 'docs/russell-dudek-westinghouse-opx-chief-of-staff-cover-letter.pdf'],
            ['interview-brief.html', 'docs/russell-dudek-westinghouse-opx-chief-of-staff-interview-brief.pdf'],
            ['120-day-plan.html', 'docs/russell-dudek-westinghouse-opx-chief-of-staff-120-day-plan.pdf']
          ];
          (async () => {
            const browser = await chromium.launch({ headless: true });
            for (const [html, pdf] of jobs) {
              const page = await browser.newPage({ viewport: { width: 1280, height: 900 } });
              await page.goto(`http://127.0.0.1:8765/${html}`, { waitUntil: 'networkidle' });
              await page.emulateMedia({ media: 'print' });
              await page.pdf({
                path: pdf,
                format: 'Letter',
                printBackground: true,
                preferCSSPageSize: true,
                margin: { top: '0', right: '0', bottom: '0', left: '0' }
              });
              await page.close();
            }
            await browser.close();
          })().catch(error => { console.error(error); process.exit(1); });
          NODE
          node /tmp/roleforge-render/render.js

      - name: Verify PDF contracts
        shell: bash
        run: |
          set -euo pipefail
          check_pages() {
            local file="$1" expected="$2"
            test -s "$file"
            actual=$(pdfinfo "$file" | awk '/^Pages:/ {print $2}')
            echo "$file: $actual pages"
            test "$actual" = "$expected"
          }
          check_pages docs/russell-dudek-westinghouse-opx-chief-of-staff-resume.pdf 2
          check_pages docs/russell-dudek-westinghouse-opx-chief-of-staff-cover-letter.pdf 1
          check_pages docs/russell-dudek-westinghouse-opx-chief-of-staff-interview-brief.pdf 4
          check_pages docs/russell-dudek-westinghouse-opx-chief-of-staff-120-day-plan.pdf 3

      - name: Finalize clean main-branch manifest
        shell: bash
        run: |
          set -euo pipefail
          printf 'ROLEFORGE-WESTINGHOUSE-PUBLICATION-RUN-%s\n' "$GITHUB_RUN_ID" > deployment-proof.txt
          rm -f resume.pdf cover-letter.pdf alignment.css
          rm -rf .roleforge-payload
          rm -f .github/workflows/fetch-brand-assets.yml
          rm -f .github/workflows/publish-roleforge-campaign.yml
          git config user.name 'RoleForge Campaign Publisher'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Publish complete Westinghouse RoleForge campaign'
          git push origin HEAD:main
