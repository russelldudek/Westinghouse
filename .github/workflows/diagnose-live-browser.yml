name: Diagnose live RoleForge browser audit

on:
  push:
    paths:
      - '.github/workflows/diagnose-live-browser.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Run and persist browser audit
        shell: bash
        run: |
          set -euo pipefail
          BROWSER=$(command -v google-chrome || command -v chromium || command -v chromium-browser)
          mkdir -p /tmp/live-browser-audit
          cd /tmp/live-browser-audit
          npm init -y >/dev/null 2>&1
          npm install playwright-core@1.52.0 >/dev/null 2>&1
          cat > audit.js <<'NODE'
          const { chromium } = require('playwright-core');
          const fs = require('fs');
          const base='https://russelldudek.github.io/Westinghouse/';
          const sizes=[[1440,900,'desktop'],[1280,800,'laptop'],[768,1024,'tablet'],[390,844,'mobile']];
          (async()=>{
            const browser=await chromium.launch({headless:true,executablePath:process.env.BROWSER,args:['--no-sandbox']});
            const report={base,viewports:{},reducedMotion:{},consoleErrors:[],pageErrors:[]};
            for(const [width,height,name] of sizes){
              const context=await browser.newContext({viewport:{width,height}}); const page=await context.newPage();
              page.on('console',m=>{if(m.type()==='error')report.consoleErrors.push(`${name}: ${m.text()}`)});
              page.on('pageerror',e=>report.pageErrors.push(`${name}: ${e.message}`));
              await page.goto(base,{waitUntil:'networkidle'});
              const initial=await page.evaluate(()=>({overflow:Math.max(0,document.documentElement.scrollWidth-innerWidth),logoVisible:!!document.querySelector('.company-lockup img')?.getBoundingClientRect().width,independent:document.body.innerText.toLowerCase().includes('independent candidate work'),navToggleVisible:getComputedStyle(document.querySelector('.nav-toggle')).display!=='none'}));
              await page.locator('[data-scenario="capacity"]').click();
              const scenario=await page.locator('#heroSystem').getAttribute('data-state');
              await page.locator('#commitments').evaluate(el=>{el.value='1';el.dispatchEvent(new Event('input',{bubbles:true}))});
              const simulator=await page.locator('#statusLabel').innerText();
              report.viewports[name]={width,height,...initial,scenario,simulator};
              await context.close();
            }
            const reduced=await browser.newContext({viewport:{width:1280,height:800},reducedMotion:'reduce'}); const page=await reduced.newPage();
            await page.goto(base,{waitUntil:'networkidle'});
            report.reducedMotion=await page.evaluate(()=>({contourAnimation:getComputedStyle(document.querySelector('.contour')).animationName,coreAnimation:getComputedStyle(document.querySelector('.core-pulse')).animationName,signalDisplay:getComputedStyle(document.querySelector('.signal-dot')).display,controlsUsable:!document.querySelector('[data-scenario="capacity"]').disabled}));
            await page.locator('[data-scenario="decision"]').click(); report.reducedMotion.scenario=await page.locator('#heroSystem').getAttribute('data-state');
            await reduced.close(); await browser.close();
            const failures=[];
            for(const [name,r] of Object.entries(report.viewports)){if(r.overflow!==0||!r.logoVisible||!r.independent||r.scenario!=='capacity')failures.push(name)}
            if(report.pageErrors.length)failures.push('page-errors');
            if(report.reducedMotion.contourAnimation!=='none'||report.reducedMotion.coreAnimation!=='none'||report.reducedMotion.signalDisplay!=='none'||!report.reducedMotion.controlsUsable||report.reducedMotion.scenario!=='decision')failures.push('reduced-motion');
            report.passed=failures.length===0; report.failures=failures;
            fs.writeFileSync(process.env.GITHUB_WORKSPACE+'/live-browser-diagnostic.json',JSON.stringify(report,null,2));
          })().catch(e=>{fs.writeFileSync(process.env.GITHUB_WORKSPACE+'/live-browser-diagnostic.json',JSON.stringify({passed:false,fatal:e.stack||String(e)},null,2));});
          NODE
          BROWSER="$BROWSER" node audit.js
          cd "$GITHUB_WORKSPACE"
          git config user.name 'RoleForge Browser Diagnostic'
          git config user.email 'actions@users.noreply.github.com'
          git add live-browser-diagnostic.json
          git commit -m 'Record live browser audit diagnostic'
          git push origin HEAD:main
