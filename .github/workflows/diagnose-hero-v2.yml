name: Diagnose hero v2 browser audit

on:
  push:
    paths:
      - '.github/workflows/diagnose-hero-v2.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - run: python3 -m pip install --user playwright
      - name: Capture browser diagnostic
        shell: bash
        env:
          BASE_URL: https://russelldudek.github.io/Westinghouse/
        run: |
          export BROWSER=$(command -v google-chrome || command -v chromium || command -v chromium-browser || true)
          rm -f hero-v2-diagnostic.json
          cat > /tmp/diag.py <<'PY'
          import json, os, traceback
          from pathlib import Path
          from playwright.sync_api import sync_playwright

          report={'browser':os.environ.get('BROWSER'),'steps':[],'failures':[],'exception':None}
          try:
              with sync_playwright() as p:
                  report['steps'].append('playwright-started')
                  browser=p.chromium.launch(executable_path=os.environ.get('BROWSER') or None,headless=True,args=['--no-sandbox'])
                  report['steps'].append('browser-launched')
                  context=browser.new_context(viewport={'width':390,'height':844})
                  page=context.new_page()
                  page.goto(os.environ['BASE_URL']+'?diag='+os.environ['GITHUB_RUN_ID'],wait_until='domcontentloaded',timeout=60000)
                  report['steps'].append('page-loaded')
                  page.wait_for_selector('.loop-segment',timeout=30000)
                  report['steps'].append('loop-rendered')
                  report['counts']={
                      'nodes':page.locator('.system-node').count(),
                      'segments':page.locator('.loop-segment').count(),
                      'arrows':page.locator('.loop-arrow').count(),
                      'packets':page.locator('.flow-packet').count(),
                  }
                  report['qualifierVisible']=page.locator('.company-lockup span').is_visible()
                  for scenario,selector in {'capacity':'.loop-top','decision':'.loop-right','learning':'.loop-bottom'}.items():
                      page.locator(f'[data-scenario="{scenario}"]').click(timeout=30000)
                      report.setdefault('states',{})[scenario]={
                          'state':page.locator('#heroSystem').get_attribute('data-state'),
                          'stroke':page.locator(selector).evaluate('el=>getComputedStyle(el).stroke'),
                      }
                  report['steps'].append('scenarios-passed')
                  report['overflow']=page.evaluate('document.documentElement.scrollWidth-document.documentElement.clientWidth')
                  context.close();browser.close()
                  report['passed']=True
          except Exception as exc:
              report['passed']=False
              report['exception']=repr(exc)
              report['traceback']=traceback.format_exc()
          Path('hero-v2-diagnostic.json').write_text(json.dumps(report,indent=2)+'\n')
          print(json.dumps(report,indent=2))
          PY
          python3 /tmp/diag.py
      - name: Commit diagnostic
        if: always()
        shell: bash
        run: |
          git config user.name 'RoleForge Hero Diagnostic'
          git config user.email 'actions@users.noreply.github.com'
          git add hero-v2-diagnostic.json
          git commit -m 'Record hero v2 browser diagnostic' || true
          git push origin HEAD:main
