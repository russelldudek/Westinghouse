name: Fetch official Westinghouse brand assets

on:
  push:
    paths:
      - '.github/workflows/fetch-brand-assets.yml'

permissions:
  contents: write

jobs:
  fetch-brand-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Acquire unmodified official assets and source evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assets/brand assets/company
          home_url='https://westinghousenuclear.com/'
          careers_url='https://careers.westinghousenuclear.com/'
          curl -L --fail --retry 3 --retry-delay 2 'https://westinghousenuclear.com/media/550fcpcf/westinghouse-logo-header-140-278.png' -o assets/brand/westinghouse-logo-blue.png
          curl -L --fail --retry 3 --retry-delay 2 'https://westinghousenuclear.com/media/j0qj14ma/westinghouse-logo-header-white-140-278.png' -o assets/brand/westinghouse-logo-white.png
          curl -L --fail --retry 3 --retry-delay 2 'https://westinghousenuclear.com/assets/img/westinghouse-logo-both-278x67.png' -o assets/brand/westinghouse-logo-both-278x67.png
          curl -L --fail --retry 3 --retry-delay 2 'https://westinghousenuclear.com/media/31rh5jpq/ap1000-pwr-circle.png' -o assets/company/ap1000-pwr-circle.png
          curl -L --fail --retry 3 --retry-delay 2 'https://westinghousenuclear.com/media/mwjem53b/home25-leftimage-bg-image.jpg?format=webp' -o assets/company/westinghouse-facility.webp
          curl -L --fail --retry 3 --retry-delay 2 "$home_url" -o /tmp/westinghouse-home.html
          curl -L --fail --retry 3 --retry-delay 2 "$careers_url" -o /tmp/westinghouse-careers.html
          curl -L --fail --retry 3 --retry-delay 2 'https://westinghousenuclear.com/css/main.min.css?v=3.0' -o /tmp/westinghouse-main.css
          curl -L --fail --retry 3 --retry-delay 2 'https://westinghousenuclear.com/assets/css/themes/_westinghouse-transparent_2020.css?v=2.0' -o /tmp/westinghouse-theme.css
          curl -L --fail --retry 3 --retry-delay 2 'https://rmkcdn.successfactors.com/70ab5f1f/daadc059-5a90-4cce-885c-4.css' -o /tmp/westinghouse-careers.css
          python - <<'PY'
          from pathlib import Path
          from html.parser import HTMLParser
          from urllib.parse import urljoin
          import re

          class Collector(HTMLParser):
              def __init__(self, base):
                  super().__init__(); self.base=base; self.styles=[]; self.images=[]
              def handle_starttag(self, tag, attrs):
                  a=dict(attrs)
                  if tag=='link' and 'stylesheet' in a.get('rel','') and a.get('href'):
                      self.styles.append(urljoin(self.base,a['href']))
                  if tag=='img' and a.get('src'):
                      self.images.append(urljoin(self.base,a['src']))

          rows=[]
          for name,base,path in [
              ('corporate homepage','https://westinghousenuclear.com/','/tmp/westinghouse-home.html'),
              ('careers homepage','https://careers.westinghousenuclear.com/','/tmp/westinghouse-careers.html')
          ]:
              p=Collector(base); p.feed(Path(path).read_text(errors='ignore'))
              rows += [f'[{name}]','Stylesheets:'] + [f'- {u}' for u in p.styles]
              rows += ['Logo/image candidates:'] + [f'- {u}' for u in p.images if any(k in u.lower() for k in ('logo','westinghouse','ap1000'))] + ['']
          Path('assets/brand/official-source-urls.txt').write_text('\n'.join(rows))

          evidence=[]
          for label,path in [('corporate main CSS','/tmp/westinghouse-main.css'),('corporate theme CSS','/tmp/westinghouse-theme.css'),('careers CSS','/tmp/westinghouse-careers.css')]:
              text=Path(path).read_text(errors='ignore')
              fonts=sorted(set(re.findall(r'font-family\s*:\s*([^;}{]+)',text,re.I)))
              colors=sorted(set(re.findall(r'#[0-9a-fA-F]{6}\b',text)))
              evidence.append(f'[{label}]')
              evidence.append('Font-family declarations:')
              evidence.extend(f'- {f.strip()}' for f in fonts[:40])
              evidence.append('Frequent/source color candidates:')
              from collections import Counter
              counts=Counter(re.findall(r'#[0-9a-fA-F]{6}\b',text))
              evidence.extend(f'- {c} ({n})' for c,n in counts.most_common(30))
              evidence.append('')
          Path('assets/brand/official-css-evidence.txt').write_text('\n'.join(evidence))
          PY
          for f in assets/brand/*.png assets/company/*; do file "$f"; done
          sha256sum assets/brand/*.png assets/company/* > assets/brand/asset-checksums.sha256
          printf '%s\n' "$GITHUB_RUN_ID" > assets/brand/brand-artifact-run-id.txt
      - name: Upload brand asset bundle
        uses: actions/upload-artifact@v4
        with:
          name: westinghouse-brand-assets
          path: |
            assets/brand
            assets/company
          if-no-files-found: error
      - name: Commit acquired assets and evidence
        shell: bash
        run: |
          git config user.name 'RoleForge Brand Asset Bot'
          git config user.email 'actions@users.noreply.github.com'
          git add assets/brand assets/company
          git diff --cached --quiet && exit 0
          git commit -m 'Complete official Westinghouse brand asset package'
          git push origin HEAD:main
