name: Regenerate contact-complete application PDFs

on:
  push:
    paths:
      - '.github/workflows/regenerate-contact-documents.yml'

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install verification tools
        shell: bash
        run: |
          set -euo pipefail
          command -v pdfinfo >/dev/null || { sudo apt-get update; sudo apt-get install -y poppler-utils; }
          python3 -m pip install --user playwright

      - name: Render résumé and cover letter PDFs
        shell: bash
        run: |
          set -euo pipefail
          BROWSER=$(command -v google-chrome || command -v chromium || command -v chromium-browser)
          python3 -m http.server 8765 --bind 127.0.0.1 >/tmp/roleforge-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID || true' EXIT
          sleep 2
          render() {
            local html="$1" pdf="$2"
            "$BROWSER" --headless --no-sandbox --disable-gpu --hide-scrollbars \
              --no-pdf-header-footer --virtual-time-budget=3000 \
              --print-to-pdf="$pdf" "http://127.0.0.1:8765/$html"
            test -s "$pdf"
          }
          mkdir -p docs contact-audit/renders
          render resume.html docs/russell-dudek-westinghouse-opx-chief-of-staff-resume.pdf
          render cover-letter.html docs/russell-dudek-westinghouse-opx-chief-of-staff-cover-letter.pdf

      - name: Verify page counts and PDF contact text
        shell: bash
        run: |
          set -euo pipefail
          resume_pdf='docs/russell-dudek-westinghouse-opx-chief-of-staff-resume.pdf'
          cover_pdf='docs/russell-dudek-westinghouse-opx-chief-of-staff-cover-letter.pdf'
          resume_pages=$(pdfinfo "$resume_pdf" | awk '/^Pages:/ {print $2}')
          cover_pages=$(pdfinfo "$cover_pdf" | awk '/^Pages:/ {print $2}')
          pdftotext -layout "$resume_pdf" contact-audit/resume.txt
          pdftotext -layout "$cover_pdf" contact-audit/cover-letter.txt
          tr -d '\r\n ' < contact-audit/resume.txt > contact-audit/resume.compact.txt
          tr -d '\r\n ' < contact-audit/cover-letter.txt > contact-audit/cover-letter.compact.txt
          test "$resume_pages" = 2
          test "$cover_pages" = 1
          for value in '412.287.8640' 'russelldudek@gmail.com' 'linkedin.com/in/russelldudek' 'russelldudek.github.io/Westinghouse/'; do
            grep -Fq "$value" contact-audit/resume.compact.txt
            grep -Fq "$value" contact-audit/cover-letter.compact.txt
          done
          resume_phone_count=$(grep -Fo '412.287.8640' contact-audit/resume.compact.txt | wc -l)
          resume_email_count=$(grep -Fo 'russelldudek@gmail.com' contact-audit/resume.compact.txt | wc -l)
          resume_linkedin_count=$(grep -Fo 'linkedin.com/in/russelldudek' contact-audit/resume.compact.txt | wc -l)
          resume_campaign_count=$(grep -Fo 'russelldudek.github.io/Westinghouse/' contact-audit/resume.compact.txt | wc -l)
          test "$resume_phone_count" -ge 2
          test "$resume_email_count" -ge 2
          test "$resume_linkedin_count" -ge 2
          test "$resume_campaign_count" -ge 2
          pdftoppm -png -r 150 "$resume_pdf" contact-audit/renders/resume >/dev/null 2>&1
          pdftoppm -png -r 150 "$cover_pdf" contact-audit/renders/cover-letter >/dev/null 2>&1
          cat > contact-verification.json <<EOF
          {
            "resume_pages": $resume_pages,
            "cover_letter_pages": $cover_pages,
            "resume_contact_occurrences": {
              "phone": $resume_phone_count,
              "email": $resume_email_count,
              "linkedin": $resume_linkedin_count,
              "campaign_url": $resume_campaign_count
            },
            "required_values_verified_in_both_pdfs": true
          }
          EOF

      - name: Verify responsive HTML contact blocks
        shell: bash
        env:
          BROWSER_PATH: /usr/bin/google-chrome
        run: |
          set -euo pipefail
          export BROWSER_PATH=$(command -v google-chrome || command -v chromium || command -v chromium-browser)
          python3 -m http.server 8766 --bind 127.0.0.1 >/tmp/contact-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID || true' EXIT
          sleep 2
          cat > /tmp/contact_audit.py <<'PY'
          import json, os
          from playwright.sync_api import sync_playwright

          required = {
              'phone': '412.287.8640',
              'email': 'russelldudek@gmail.com',
              'linkedin': 'linkedin.com/in/russelldudek',
              'campaign': 'russelldudek.github.io/Westinghouse/'
          }
          routes = ['resume.html', 'cover-letter.html']
          viewports = {'tablet': {'width': 768, 'height': 1024}, 'mobile': {'width': 390, 'height': 844}}
          report = {'routes': {}, 'failures': []}
          with sync_playwright() as p:
              browser = p.chromium.launch(executable_path=os.environ['BROWSER_PATH'], headless=True, args=['--no-sandbox'])
              for route in routes:
                  report['routes'][route] = {}
                  for name, viewport in viewports.items():
                      context = browser.new_context(viewport=viewport)
                      page = context.new_page()
                      page.goto(f'http://127.0.0.1:8766/{route}', wait_until='networkidle')
                      blocks = page.locator('.contact-block')
                      text = ' '.join(blocks.all_text_contents())
                      overflow = page.evaluate('document.documentElement.scrollWidth-document.documentElement.clientWidth')
                      visible = blocks.first.is_visible()
                      hrefs = blocks.locator('a').evaluate_all('els => els.map(el => el.getAttribute("href"))')
                      checks = {key: value in text for key, value in required.items()}
                      if not visible or overflow != 0 or not all(checks.values()):
                          report['failures'].append({'route': route, 'viewport': name, 'visible': visible, 'overflow': overflow, 'checks': checks})
                      if not any(h and h.startswith('tel:') for h in hrefs):
                          report['failures'].append({'route': route, 'viewport': name, 'missing': 'tel link'})
                      if not any(h and h.startswith('mailto:') for h in hrefs):
                          report['failures'].append({'route': route, 'viewport': name, 'missing': 'mailto link'})
                      report['routes'][route][name] = {'visible': visible, 'overflow': overflow, 'checks': checks, 'hrefs': hrefs}
                      context.close()
              browser.close()
          report['passed'] = not report['failures']
          with open('contact-html-audit.json', 'w') as f:
              json.dump(report, f, indent=2)
              f.write('\n')
          if report['failures']:
              raise SystemExit(json.dumps(report['failures'], indent=2))
          PY
          python3 /tmp/contact_audit.py

      - uses: actions/upload-artifact@v4
        with:
          name: westinghouse-contact-document-audit
          path: |
            docs/russell-dudek-westinghouse-opx-chief-of-staff-resume.pdf
            docs/russell-dudek-westinghouse-opx-chief-of-staff-cover-letter.pdf
            contact-audit/
            contact-verification.json
            contact-html-audit.json

      - name: Commit regenerated PDFs and verification records
        shell: bash
        run: |
          set -euo pipefail
          cat > campaign-completion-audit.md <<EOF
          # Campaign Completion Audit

          **Campaign state: building.**

          The continuous four-node hero animation remains live and passed. The new Candidate Contact Information Contract has now passed source, responsive HTML, PDF text, and pagination checks:

          - résumé: exactly 2 pages;
          - cover letter: exactly 1 page;
          - verified phone, email, LinkedIn, location, and campaign URL present in both HTML and PDF output;
          - résumé contact block present on both pages;
          - tablet and mobile document views: zero horizontal overflow;
          - real tel, mailto, LinkedIn, and campaign links present in HTML.

          Remaining completion gates: visual inspection of all three regenerated PDF pages, live Pages byte verification, final canonical alignment reread, and portfolio-learning refresh.
          EOF
          rm -f .github/workflows/regenerate-contact-documents.yml
          git config user.name 'RoleForge Document Publisher'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Publish contact-complete resume and cover letter PDFs'
          git push origin HEAD:main
