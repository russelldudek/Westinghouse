name: Diagnose RoleForge payload

on:
  push:
    paths:
      - '.github/workflows/diagnose-roleforge-payload.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Validate payload bytes
        shell: bash
        run: |
          set +e
          {
            date -u
            echo "run: $GITHUB_RUN_ID"
            echo 'validation generation: 625-byte-segments'
            wc -c .roleforge-payload/chunk-*
            echo 'chunk checksums:'
            sha256sum .roleforge-payload/chunk-*
            cat .roleforge-payload/chunk-* > /tmp/source.b64
            echo 'combined:'
            wc -c /tmp/source.b64
            sha256sum /tmp/source.b64
            echo 'expected combined: b334aedfc173965e29301dd496fd2800de9d709b37a9724fa1694c18e9c40a26'
            base64 --decode /tmp/source.b64 > /tmp/source.tgz
            echo "base64 decode exit: $?"
            sha256sum /tmp/source.tgz
            echo 'expected archive: 0b4d125d6e640b633eae54eb6df595d47cc071c10c1df6010db23ed316b9785e'
            tar -tzf /tmp/source.tgz
            echo "tar validation exit: $?"
          } > payload-diagnostic.txt 2>&1
          git config user.name 'RoleForge Payload Diagnostic'
          git config user.email 'actions@users.noreply.github.com'
          git add payload-diagnostic.txt
          git commit -m 'Record 625-byte RoleForge payload validation'
          git push origin HEAD:main
