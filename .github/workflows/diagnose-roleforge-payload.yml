name: Diagnose RoleForge payload

on:
  push:
    paths:
      - '.github/workflows/diagnose-roleforge-payload.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Validate payload bytes
        shell: bash
        run: |
          set -u
          {
            date -u
            wc -c .roleforge-payload/chunk-*
            cat .roleforge-payload/chunk-* > /tmp/source.b64
            echo 'combined:'
            wc -c /tmp/source.b64
            sha256sum /tmp/source.b64
            if base64 --decode /tmp/source.b64 > /tmp/source.tgz; then
              echo 'base64 decode: success'
              sha256sum /tmp/source.tgz
              if tar -tzf /tmp/source.tgz; then
                echo 'tar validation: success'
              else
                echo 'tar validation: failure'
              fi
            else
              echo 'base64 decode: failure'
            fi
          } > payload-diagnostic.txt 2>&1
          git config user.name 'RoleForge Payload Diagnostic'
          git config user.email 'actions@users.noreply.github.com'
          git add payload-diagnostic.txt
          git commit -m 'Record RoleForge payload diagnostic'
          git push origin HEAD:main
