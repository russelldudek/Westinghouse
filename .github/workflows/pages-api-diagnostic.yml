name: Capture Pages API diagnostic

on:
  push:
    paths:
      - '.github/workflows/pages-api-diagnostic.yml'

permissions:
  contents: write
  pages: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Capture Pages API responses
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set +e
          gh api "repos/$GITHUB_REPOSITORY/pages" >/tmp/get.out 2>/tmp/get.err
          get_status=$?
          gh api --method PUT "repos/$GITHUB_REPOSITORY/pages" -f build_type=workflow >/tmp/put.out 2>/tmp/put.err
          put_status=$?
          gh api --method POST "repos/$GITHUB_REPOSITORY/pages" -f build_type=workflow >/tmp/post.out 2>/tmp/post.err
          post_status=$?
          {
            printf 'run_id=%s\nget_status=%s\nput_status=%s\npost_status=%s\n' "$GITHUB_RUN_ID" "$get_status" "$put_status" "$post_status"
            printf '%s\n' '--- GET stdout ---'; cat /tmp/get.out
            printf '%s\n' '--- GET stderr ---'; cat /tmp/get.err
            printf '%s\n' '--- PUT stdout ---'; cat /tmp/put.out
            printf '%s\n' '--- PUT stderr ---'; cat /tmp/put.err
            printf '%s\n' '--- POST stdout ---'; cat /tmp/post.out
            printf '%s\n' '--- POST stderr ---'; cat /tmp/post.err
          } > /tmp/diagnostic.txt
          content=$(base64 -w0 /tmp/diagnostic.txt)
          gh api --method PUT "repos/$GITHUB_REPOSITORY/contents/.pages-api-diagnostic.txt" -f message='Record Pages API diagnostic' -f content="$content" -f branch=main
