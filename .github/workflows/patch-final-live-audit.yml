name: Patch final live audit

on:
  push:
    paths:
      - '.github/workflows/patch-final-live-audit.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Correct live readiness check
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path=Path('.github/workflows/final-live-audit.yml')
          text=path.read_text()
          text=text.replace(
              "      - '.github/workflows/final-live-audit.yml'\n",
              "      - '.github/workflows/final-live-audit.yml'\n      - '.final-live-audit-trigger'\n",
              1,
          )
          text=text.replace(
              '''          for attempt in $(seq 1 180); do
            if curl -fsSL "$base/index.html?v=$GITHUB_RUN_ID-$attempt" | grep -q 'Make assurance'; then
              ready=1
              break
            fi
            sleep 5
          done''',
              '''          for attempt in $(seq 1 180); do
            if curl -fsSL "$base/index.html?v=$GITHUB_RUN_ID-$attempt" -o /tmp/live-index.html && grep -q 'Make assurance' /tmp/live-index.html; then
              ready=1
              break
            fi
            sleep 5
          done''',
              1,
          )
          text=text.replace(
              "rm -f ai-governance/live-verification-failure.txt .github/workflows/final-live-audit.yml",
              "rm -f ai-governance/live-verification-failure.txt .github/workflows/final-live-audit.yml .final-live-audit-trigger",
              1,
          )
          text=text.replace(
              "rm -f .github/workflows/final-live-audit.yml",
              "rm -f .github/workflows/final-live-audit.yml .final-live-audit-trigger",
              1,
          )
          path.write_text(text)
          PY
          rm -f .github/workflows/patch-final-live-audit.yml
          git config user.name 'Candidate Campaign Auditor'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Correct final live audit readiness check'
          git push origin HEAD:main
