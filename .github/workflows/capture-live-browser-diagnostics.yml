name: Capture live browser diagnostics

on:
  push:
    paths:
      - '.github/workflows/capture-live-browser-diagnostics.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Capture browser behavior
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check --quiet selenium
          python - <<'PY'
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          import json

          base='https://russelldudek.github.io/Westinghouse/ai-governance/'
          routes=['index.html','resume.html','cover-letter.html','interview-brief.html','120-day-plan.html','assurance-case-standard.html']
          viewports=[(1440,900),(1280,800),(768,1024),(390,844)]
          options=Options()
          options.add_argument('--headless=new')
          options.add_argument('--no-sandbox')
          options.add_argument('--disable-dev-shm-usage')
          options.add_argument('--hide-scrollbars')
          options.set_capability('goog:loggingPrefs', {'browser':'ALL'})
          driver=webdriver.Chrome(options=options)
          errors=[]
          observations={}
          checks=0
          try:
              for width,height in viewports:
                  driver.set_window_size(width,height)
                  for route in routes:
                      driver.get(base+route+'?v=diagnostic-matrix')
                      WebDriverWait(driver,30).until(lambda d: d.execute_script('return document.readyState')=='complete')
                      overflow=driver.execute_script('return document.documentElement.scrollWidth > window.innerWidth + 1')
                      if overflow:
                          errors.append(f'overflow {route} {width}x{height}')
                      checks += 1

              driver.set_window_size(1440,900)
              driver.get(base+'index.html?v=diagnostic-interaction')
              WebDriverWait(driver,30).until(EC.element_to_be_clickable((By.CSS_SELECTOR,'button[data-scenario="licensing"]'))).click()
              observations['licensing_title']=driver.find_element(By.ID,'case-title').text
              if 'Licensing' not in observations['licensing_title']:
                  errors.append('licensing scenario did not update title')
              driver.find_element(By.ID,'reset-scenario').click()
              observations['reset_title']=driver.find_element(By.ID,'case-title').text
              if 'Engineering knowledge' not in observations['reset_title']:
                  errors.append('scenario reset did not restore title')

              driver.set_window_size(390,844)
              driver.get(base+'index.html?v=diagnostic-mobile-menu')
              menu=WebDriverWait(driver,30).until(EC.element_to_be_clickable((By.CLASS_NAME,'mobile-menu')))
              menu.click()
              observations['mobile_menu_expanded']=menu.get_attribute('aria-expanded')
              if observations['mobile_menu_expanded'] != 'true':
                  errors.append('mobile menu did not expand')

              driver.execute_cdp_cmd('Emulation.setEmulatedMedia', {'features':[{'name':'prefers-reduced-motion','value':'reduce'}]})
              driver.refresh()
              WebDriverWait(driver,30).until(lambda d: d.execute_script('return document.readyState')=='complete')
              observations['motion']=driver.execute_script("""const s=getComputedStyle(document.querySelector('.assembly-piece')); const d=s.animationDuration; const ms=d.endsWith('ms')?parseFloat(d):parseFloat(d)*1000; return {name:s.animationName,duration:d,ms:ms,iterations:s.animationIterationCount,transform:s.transform};""")
              motion=observations['motion']
              if motion['ms'] > 1 or motion['iterations'] != '1' or motion['transform'] != 'none':
                  errors.append('reduced-motion contract failed: '+json.dumps(motion))

              driver.set_window_size(1280,800)
              driver.get(base+'resume.html?v=diagnostic-reciprocal')
              WebDriverWait(driver,30).until(EC.element_to_be_clickable((By.LINK_TEXT,'View Cover Letter'))).click()
              observations['cover_url']=driver.current_url
              if 'cover-letter.html' not in observations['cover_url']:
                  errors.append('resume did not navigate to cover letter')
              WebDriverWait(driver,30).until(EC.element_to_be_clickable((By.LINK_TEXT,'View Resume'))).click()
              observations['resume_url']=driver.current_url
              if 'resume.html' not in observations['resume_url']:
                  errors.append('cover letter did not navigate to resume')

              observations['browser_log']=driver.get_log('browser')
              severe=[]
              for entry in observations['browser_log']:
                  if entry.get('level') != 'SEVERE':
                      continue
                  message=entry.get('message','')
                  if 'favicon.ico' in message and '404' in message:
                      continue
                  severe.append(entry)
              if severe:
                  errors.append('browser errors: '+json.dumps(severe))
          except Exception as exc:
              errors.append(type(exc).__name__+': '+str(exc))
          finally:
              driver.quit()

          with open('ai-governance/live-browser-diagnostics.json','w') as handle:
              json.dump({'route_viewport_checks':checks,'errors':errors,'observations':observations},handle,indent=2)
          PY
          rm -f .github/workflows/capture-live-browser-diagnostics.yml
          git config user.name 'Candidate Campaign Auditor'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Capture live browser diagnostics'
          git push origin HEAD:main
