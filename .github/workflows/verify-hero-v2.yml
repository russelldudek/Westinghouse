name: Verify continuous four-node hero

on:
  push:
    paths:
      - '.github/workflows/verify-hero-v2.yml'

permissions:
  contents: write

concurrency:
  group: westinghouse-hero-v2-verification
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Record active verification run
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'RoleForge Hero Verifier'
          git config user.email 'actions@users.noreply.github.com'
          printf '%s\n' "$GITHUB_RUN_ID" > hero-v2-verification-run-id.txt
          git add hero-v2-verification-run-id.txt
          git commit -m 'Record active hero v2 verification run'
          git push origin HEAD:main

      - name: Wait for Pages to serve the new implementation
        shell: bash
        run: |
          set -euo pipefail
          base='https://russelldudek.github.io/Westinghouse'
          expected_app=$(sha256sum app.js | awk '{print $1}')
          expected_css=$(sha256sum hero-envelope-v2.css | awk '{print $1}')
          matched=0
          for attempt in $(seq 1 60); do
            curl -fsSL "$base/app.js?hero-v2=$GITHUB_RUN_ID-$attempt" -o /tmp/live-app.js || true
            curl -fsSL "$base/hero-envelope-v2.css?hero-v2=$GITHUB_RUN_ID-$attempt" -o /tmp/live-hero.css || true
            live_app=$(sha256sum /tmp/live-app.js 2>/dev/null | awk '{print $1}' || true)
            live_css=$(sha256sum /tmp/live-hero.css 2>/dev/null | awk '{print $1}' || true)
            if [ "$live_app" = "$expected_app" ] && [ "$live_css" = "$expected_css" ]; then
              matched=1
              break
            fi
            sleep 10
          done
          test "$matched" = 1
          {
            printf 'path\tcommitted_sha256\tlive_sha256\n'
            printf 'app.js\t%s\t%s\n' "$expected_app" "$live_app"
            printf 'hero-envelope-v2.css\t%s\t%s\n' "$expected_css" "$live_css"
          } > live-hash-verification.tsv

      - name: Install browser audit dependency
        shell: bash
        run: python3 -m pip install --user playwright

      - name: Audit live rendered animation
        shell: bash
        env:
          BASE_URL: https://russelldudek.github.io/Westinghouse/
        run: |
          set -euo pipefail
          BROWSER=$(command -v google-chrome || command -v chromium || command -v chromium-browser)
          export BROWSER
          mkdir -p audit-renders
          cat > /tmp/audit_hero.py <<'PY'
          import json
          import os
          from pathlib import Path
          from playwright.sync_api import sync_playwright

          base = os.environ['BASE_URL']
          browser_path = os.environ['BROWSER']
          run_id = os.environ['GITHUB_RUN_ID']
          viewports = {
              'desktop': {'width': 1440, 'height': 900},
              'laptop': {'width': 1280, 'height': 800},
              'tablet': {'width': 768, 'height': 1024},
              'mobile': {'width': 390, 'height': 844},
          }
          scenario_segments = {
              'capacity': '.loop-top',
              'decision': '.loop-right',
              'learning': '.loop-bottom',
          }
          report = {'base': base, 'run_id': run_id, 'viewports': {}, 'reducedMotion': {}, 'failures': []}

          def fail(message):
              report['failures'].append(message)

          with sync_playwright() as p:
              browser = p.chromium.launch(executable_path=browser_path, headless=True, args=['--no-sandbox'])
              for name, viewport in viewports.items():
                  context = browser.new_context(viewport=viewport)
                  page = context.new_page()
                  page_errors = []
                  http_errors = []
                  page.on('pageerror', lambda error, bucket=page_errors: bucket.append(str(error)))
                  page.on('response', lambda response, bucket=http_errors: bucket.append({'url': response.url, 'status': response.status}) if response.status >= 400 and response.url.startswith(base) and not response.url.endswith('favicon.ico') else None)
                  page.goto(f'{base}?hero-v2-audit={run_id}-{name}', wait_until='networkidle')
                  page.wait_for_selector('.loop-segment')

                  counts = {
                      'nodes': page.locator('.system-node').count(),
                      'segments': page.locator('.loop-segment').count(),
                      'arrows': page.locator('.loop-arrow').count(),
                      'packets': page.locator('.flow-packet').count(),
                  }
                  overflow = page.evaluate('document.documentElement.scrollWidth - document.documentElement.clientWidth')
                  logo_visible = page.locator('.company-lockup img').is_visible()
                  independent = 'independent candidate work' in page.locator('.company-lockup').inner_text().lower()

                  if counts != {'nodes': 4, 'segments': 4, 'arrows': 4, 'packets': 2}:
                      fail(f'{name}: unexpected operating-loop counts {counts}')
                  if overflow != 0:
                      fail(f'{name}: horizontal overflow {overflow}px')
                  if not logo_visible or not independent:
                      fail(f'{name}: company identity or independent-candidate label missing')

                  scenario_results = {}
                  for scenario, selector in scenario_segments.items():
                      button = page.locator(f'[data-scenario="{scenario}"]')
                      button.click()
                      page.wait_for_timeout(250)
                      state = page.locator('#heroSystem').get_attribute('data-state')
                      pressed = button.get_attribute('aria-pressed')
                      stroke = page.locator(selector).evaluate('el => getComputedStyle(el).stroke')
                      core = page.locator('#coreStatus').inner_text()
                      scenario_results[scenario] = {'state': state, 'ariaPressed': pressed, 'stroke': stroke, 'core': core}
                      if state != scenario or pressed != 'true':
                          fail(f'{name}: {scenario} did not become the active accessible state')
                      if '255, 98, 92' not in stroke:
                          fail(f'{name}: {scenario} did not highlight its loop segment; stroke={stroke}')

                  page.screenshot(path=f'audit-renders/{name}.png', full_page=True)
                  report['viewports'][name] = {
                      'width': viewport['width'],
                      'height': viewport['height'],
                      'overflow': overflow,
                      'logoVisible': logo_visible,
                      'independent': independent,
                      'counts': counts,
                      'scenarios': scenario_results,
                      'pageErrors': page_errors,
                      'httpErrors': http_errors,
                  }
                  if page_errors:
                      fail(f'{name}: page errors {page_errors}')
                  if http_errors:
                      fail(f'{name}: campaign HTTP errors {http_errors}')
                  context.close()

              reduced = browser.new_context(viewport={'width': 1280, 'height': 800}, reduced_motion='reduce')
              reduced_page = reduced.new_page()
              reduced_page.goto(f'{base}?hero-v2-audit={run_id}-reduced', wait_until='networkidle')
              reduced_page.wait_for_selector('.loop-segment')
              reduced_page.locator('[data-scenario="capacity"]').click()
              reduced_page.wait_for_timeout(100)
              packet_display = reduced_page.locator('.flow-packet').first.evaluate('el => getComputedStyle(el).display')
              loop_animation = reduced_page.locator('.loop-flow').evaluate('el => getComputedStyle(el).animationName')
              halo_animation = reduced_page.locator('.node-constraint .node-halo').evaluate('el => getComputedStyle(el).animationName')
              reduced_state = reduced_page.locator('#heroSystem').get_attribute('data-state')
              report['reducedMotion'] = {
                  'packetDisplay': packet_display,
                  'loopAnimation': loop_animation,
                  'haloAnimation': halo_animation,
                  'scenario': reduced_state,
              }
              if packet_display != 'none' or loop_animation != 'none' or halo_animation != 'none' or reduced_state != 'capacity':
                  fail(f'reduced motion failed: {report["reducedMotion"]}')
              reduced_page.screenshot(path='audit-renders/reduced-motion.png', full_page=True)
              reduced.close()
              browser.close()

          report['passed'] = not report['failures']
          Path('live-browser-audit.json').write_text(json.dumps(report, indent=2) + '\n')
          if report['failures']:
              raise SystemExit('\n'.join(report['failures']))
          PY
          python3 /tmp/audit_hero.py

      - uses: actions/upload-artifact@v4
        with:
          name: westinghouse-hero-v2-render-audit
          path: |
            audit-renders/
            live-browser-audit.json
            live-hash-verification.tsv

      - name: Commit refreshed campaign audits
        shell: bash
        run: |
          set -euo pipefail
          source_head=$(git rev-parse HEAD)
          cat > campaign-completion-audit.md <<EOF
          # Campaign Completion Audit

          **Campaign state: complete.**

          - Campaign repository: https://github.com/russelldudek/Westinghouse
          - Audited branch: main
          - Audited implementation head: $source_head
          - Live site: https://russelldudek.github.io/Westinghouse/
          - Hero animation: continuous four-node loop passed
          - Loop topology: 4 nodes, 4 connecting segments, 4 directional arrows, 2 full-cycle signal packets
          - Scenario behavior: capacity, decision, and learning states each highlight the relevant segment and node
          - Responsive render review: passed at 1440x900, 1280x800, 768x1024, and 390x844
          - Reduced motion: passed; packets hidden and loop/halo animations disabled while interaction remains usable
          - Live source comparison: app.js and hero-envelope-v2.css matched committed bytes
          - Brand fidelity: passed
          - Documents/PDFs: unchanged and remain passed
          - Canonical Skill Alignment Audit: passed
          - Campaign Completion Audit: passed
          - Verification run: $GITHUB_RUN_ID

          Final live deployment proof: ROLEFORGE-WESTINGHOUSE-HERO-V2-$GITHUB_RUN_ID
          EOF
          cat > canonical-alignment-audit.md <<EOF
          # Canonical RoleForge Alignment Audit

          **Result: passed.**

          Campaign: Westinghouse - OPX Chief of Staff  
          Repository: russelldudek/Westinghouse  
          Audited branch: main  
          Audited implementation head: $source_head  
          Audit date: July 12, 2026

          The revised hero now makes the complete operating system explicit: Commitments -> Constraints -> Decisions -> Learning -> Commitments. The continuous loop, directional arrows, full-cycle signal packets, scenario-specific boundary degradation, executive-attention readout, keyboard state, and reduced-motion equivalent satisfy the latest Visual Experience and Role-Derived Motion contracts. Brand identity, evidence, documents, and print artifacts were not altered.
          EOF
          python3 - <<PY
          import json
          from pathlib import Path
          path = Path('campaign-metadata.json')
          data = json.loads(path.read_text())
          data['campaign_state'] = 'complete'
          data['audited_implementation_head'] = '$source_head'
          data['live_site'] = 'https://russelldudek.github.io/Westinghouse/'
          data['live_verification_run_id'] = '$GITHUB_RUN_ID'
          data['hero_animation_version'] = 'continuous-four-node-loop-v2'
          path.write_text(json.dumps(data, indent=2) + '\n')
          PY
          python3 - <<PY
          from pathlib import Path
          path = Path('README.md')
          text = path.read_text()
          text = text.replace('- Audited source head: pending post-animation verification', '- Audited implementation head: $source_head')
          text = text.replace('- Live verification run: pending post-animation verification', '- Live verification run: $GITHUB_RUN_ID')
          text = text.replace('- Canonical Alignment, Brand Fidelity, and Campaign Completion audits: pending post-animation refresh', '- Canonical Alignment, Brand Fidelity, and Campaign Completion audits: passed')
          path.write_text(text)
          PY
          printf 'ROLEFORGE-WESTINGHOUSE-HERO-V2-%s\n' "$GITHUB_RUN_ID" > deployment-proof.txt
          rm -f hero-v2-verification-run-id.txt
          rm -f .github/workflows/verify-hero-v2.yml
          git config user.name 'RoleForge Hero Verifier'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Verify continuous four-node hero animation'
          git push origin HEAD:main

      - name: Verify final audit proof is live
        shell: bash
        run: |
          set -euo pipefail
          expected="ROLEFORGE-WESTINGHOUSE-HERO-V2-$GITHUB_RUN_ID"
          matched=0
          for attempt in $(seq 1 60); do
            live=$(curl -fsSL "https://russelldudek.github.io/Westinghouse/deployment-proof.txt?hero-v2=$GITHUB_RUN_ID-$attempt" || true)
            if [ "$live" = "$expected" ]; then
              matched=1
              break
            fi
            sleep 10
          done
          test "$matched" = 1
