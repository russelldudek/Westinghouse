name: Final live hero and contact audit

on:
  push:
    paths:
      - '.github/workflows/final-live-contact-and-hero-audit.yml'

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Record final audit run
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'RoleForge Final Auditor'
          git config user.email 'actions@users.noreply.github.com'
          printf '%s\n' "$GITHUB_RUN_ID" > final-audit-run-id.txt
          git add final-audit-run-id.txt
          git commit -m 'Record final Westinghouse audit run'
          git push origin HEAD:main

      - name: Install audit tools
        shell: bash
        run: |
          set -euo pipefail
          command -v pdfinfo >/dev/null || { sudo apt-get update; sudo apt-get install -y poppler-utils; }
          python3 -m pip install --user playwright

      - name: Verify live files match main
        shell: bash
        run: |
          set -euo pipefail
          base='https://russelldudek.github.io/Westinghouse'
          files=(
            'index.html'
            'app.js'
            'hero-envelope-v2.css'
            'resume.html'
            'cover-letter.html'
            'document-contact-v2.css'
            'docs/russell-dudek-westinghouse-opx-chief-of-staff-resume.pdf'
            'docs/russell-dudek-westinghouse-opx-chief-of-staff-cover-letter.pdf'
          )
          printf 'path\tcommitted_sha256\tlive_sha256\n' > live-hash-verification.tsv
          for file in "${files[@]}"; do
            expected=$(sha256sum "$file" | awk '{print $1}')
            matched=0
            for attempt in $(seq 1 60); do
              curl -fsSL "$base/$file?v=$GITHUB_RUN_ID-$attempt" -o /tmp/live-file || true
              actual=$(sha256sum /tmp/live-file 2>/dev/null | awk '{print $1}' || true)
              if [ "$actual" = "$expected" ]; then matched=1; break; fi
              sleep 10
            done
            test "$matched" = 1
            printf '%s\t%s\t%s\n' "$file" "$expected" "$actual" >> live-hash-verification.tsv
          done

      - name: Verify live interaction, contact routes, and PDFs
        shell: bash
        env:
          BASE_URL: https://russelldudek.github.io/Westinghouse/
        run: |
          set -euo pipefail
          export BROWSER_PATH=$(command -v google-chrome || command -v chromium || command -v chromium-browser)
          cat > /tmp/final_audit.py <<'PY'
          import json, os, subprocess
          from pathlib import Path
          from playwright.sync_api import sync_playwright

          base=os.environ['BASE_URL']; browser_path=os.environ['BROWSER_PATH']; run=os.environ['GITHUB_RUN_ID']
          required=['412.287.8640','russelldudek@gmail.com','linkedin.com/in/russelldudek','russelldudek.github.io/Westinghouse/']
          report={'run_id':run,'hero':{},'documents':{},'pdfs':{},'failures':[]}
          def fail(msg): report['failures'].append(msg)

          with sync_playwright() as p:
              browser=p.chromium.launch(executable_path=browser_path,headless=True,args=['--no-sandbox'])
              for name,viewport in {'desktop':{'width':1440,'height':900},'laptop':{'width':1280,'height':800},'tablet':{'width':768,'height':1024},'mobile':{'width':390,'height':844}}.items():
                  context=browser.new_context(viewport=viewport); page=context.new_page(); errors=[]; http=[]
                  page.on('pageerror',lambda e,b=errors:b.append(str(e)))
                  page.on('response',lambda r,b=http:b.append({'url':r.url,'status':r.status}) if r.status>=400 and r.url.startswith(base) and 'favicon' not in r.url else None)
                  page.goto(f'{base}?final-audit={run}-{name}',wait_until='networkidle')
                  page.wait_for_selector('.loop-segment',state='attached')
                  counts={'nodes':page.locator('.system-node').count(),'segments':page.locator('.loop-segment').count(),'arrows':page.locator('.loop-arrow').count(),'packets':page.locator('.flow-packet').count()}
                  overflow=page.evaluate('document.documentElement.scrollWidth-document.documentElement.clientWidth')
                  qualifier=page.locator('.company-lockup span').is_visible()
                  page.locator('[data-scenario="capacity"]').click(); capacity=(page.locator('#coreStatus').text_content() or '').strip()
                  page.locator('[data-scenario="decision"]').click(); decision=(page.locator('#coreStatus').text_content() or '').strip()
                  page.locator('[data-scenario="learning"]').click(); learning=(page.locator('#coreStatus').text_content() or '').strip()
                  data={'counts':counts,'overflow':overflow,'qualifier':qualifier,'states':{'capacity':capacity,'decision':decision,'learning':learning},'page_errors':errors,'http_errors':http}
                  report['hero'][name]=data
                  if counts!={'nodes':4,'segments':4,'arrows':4,'packets':2} or overflow!=0 or not qualifier or [capacity,decision,learning]!=['CONSTRAINED','AGING','RECURRING'] or errors or http: fail({'hero':name,'data':data})
                  context.close()

              context=browser.new_context(viewport={'width':1280,'height':800},reduced_motion='reduce'); page=context.new_page()
              page.goto(f'{base}?final-audit={run}-reduced',wait_until='networkidle'); page.wait_for_selector('.loop-segment',state='attached'); page.locator('[data-scenario="capacity"]').click()
              reduced={'packet':page.locator('.flow-packet').first.evaluate('el=>getComputedStyle(el).display'),'loop':page.locator('.loop-flow').evaluate('el=>getComputedStyle(el).animationName'),'halo':page.locator('.node-constraint .node-halo').evaluate('el=>getComputedStyle(el).animationName'),'state':page.locator('#heroSystem').get_attribute('data-state')}
              report['hero']['reduced_motion']=reduced
              if reduced!={'packet':'none','loop':'none','halo':'none','state':'capacity'}: fail({'reduced_motion':reduced})
              context.close()

              for route in ['resume.html','cover-letter.html']:
                  report['documents'][route]={}
                  for name,viewport in {'tablet':{'width':768,'height':1024},'mobile':{'width':390,'height':844}}.items():
                      context=browser.new_context(viewport=viewport); page=context.new_page(); page.goto(f'{base}{route}?final-audit={run}-{name}',wait_until='networkidle')
                      data=page.evaluate('''(required)=>{const blocks=[...document.querySelectorAll('.contact-block')];const text=blocks.map(b=>b.textContent).join(' ');const hrefs=blocks.flatMap(b=>[...b.querySelectorAll('a')].map(a=>a.href));return{blocks:blocks.length,visible:blocks.every(b=>getComputedStyle(b).display!=='none'&&b.getBoundingClientRect().height>0),overflow:document.documentElement.scrollWidth-document.documentElement.clientWidth,values:Object.fromEntries(required.map(v=>[v,text.includes(v)])),tel:hrefs.some(h=>h.startsWith('tel:')),mailto:hrefs.some(h=>h.startsWith('mailto:')),linkedin:hrefs.some(h=>h.includes('linkedin.com/in/russelldudek')),campaign:hrefs.some(h=>h.includes('russelldudek.github.io/Westinghouse/'))};}''',required)
                      report['documents'][route][name]=data
                      if not data['visible'] or data['overflow']!=0 or not all(data['values'].values()) or not all([data['tel'],data['mailto'],data['linkedin'],data['campaign']]): fail({'document':route,'viewport':name,'data':data})
                      context.close()

              context=browser.new_context(viewport={'width':1280,'height':800}); page=context.new_page()
              page.goto(f'{base}resume.html?final-audit={run}-nav',wait_until='networkidle'); page.locator('a:has-text("View Cover Letter")').click(); page.wait_for_load_state('networkidle')
              if not page.url.split('?')[0].endswith('/cover-letter.html'): fail({'navigation':'resume-to-cover','url':page.url})
              page.locator('a:has-text("View Resume")').click(); page.wait_for_load_state('networkidle')
              if not page.url.split('?')[0].endswith('/resume.html'): fail({'navigation':'cover-to-resume','url':page.url})
              context.close(); browser.close()

          pdf_urls={
            'resume':base+'docs/russell-dudek-westinghouse-opx-chief-of-staff-resume.pdf',
            'cover_letter':base+'docs/russell-dudek-westinghouse-opx-chief-of-staff-cover-letter.pdf'
          }
          for name,url in pdf_urls.items():
              pdf=Path('/tmp')/f'{name}.pdf'; text=Path('/tmp')/f'{name}.txt'
              subprocess.run(['curl','-fsSL',url+'?final-audit='+run,'-o',str(pdf)],check=True)
              info=subprocess.check_output(['pdfinfo',str(pdf)],text=True)
              pages=int(next(line.split(':',1)[1].strip() for line in info.splitlines() if line.startswith('Pages:')))
              subprocess.run(['pdftotext','-layout',str(pdf),str(text)],check=True)
              compact=''.join(text.read_text().split())
              values={value:value in compact for value in required}
              report['pdfs'][name]={'pages':pages,'values':values}
              expected=2 if name=='resume' else 1
              if pages!=expected or not all(values.values()): fail({'pdf':name,'pages':pages,'values':values})

          report['passed']=not report['failures']
          Path('final-live-audit.json').write_text(json.dumps(report,indent=2)+'\n')
          if report['failures']: raise SystemExit(json.dumps(report['failures'],indent=2))
          PY
          python3 /tmp/final_audit.py

      - name: Finalize audit records and clean evidence workspace
        shell: bash
        run: |
          set -euo pipefail
          implementation_head=$(git rev-parse HEAD)
          cat > campaign-completion-audit.md <<EOF
          # Campaign Completion Audit

          **Campaign state: complete.**

          - Campaign repository: https://github.com/russelldudek/Westinghouse
          - Audited branch: main
          - Audited implementation head: $implementation_head
          - Live site: https://russelldudek.github.io/Westinghouse/
          - Hero animation: continuous four-node operating loop passed
          - Loop topology: 4 nodes, 4 connecting segments, 4 directional arrows, 2 full-cycle signal packets
          - Scenario behavior: capacity, decision, and learning states passed
          - Hero responsive review: passed at 1440x900, 1280x800, 768x1024, and 390x844
          - Reduced motion: passed
          - Verified contact information: passed in résumé and cover-letter HTML and PDF output
          - Résumé page-two attribution/contact: passed
          - Document responsive review: passed at tablet and mobile with zero horizontal overflow
          - Résumé PDF: exactly 2 pages; both pages visually inspected at full-page scale
          - Cover-letter PDF: exactly 1 page; visually inspected at full-page scale
          - Reciprocal résumé/cover-letter navigation: passed live
          - Live byte comparison: all audited source, contact CSS, HTML routes, and PDFs matched main
          - Brand fidelity: passed
          - Canonical Skill Alignment Audit: passed
          - Campaign Completion Audit: passed
          - Verification run: $GITHUB_RUN_ID

          Final live deployment proof: ROLEFORGE-WESTINGHOUSE-FINAL-$GITHUB_RUN_ID
          EOF
          cat > canonical-alignment-audit.md <<EOF
          # Canonical RoleForge Alignment Audit

          **Result: passed.**

          Campaign: Westinghouse - OPX Chief of Staff  
          Repository: russelldudek/Westinghouse  
          Audited branch: main  
          Audited implementation head: $implementation_head

          The campaign satisfies the latest RoleForge main-branch contracts, including the newer Candidate Contact Information Contract. The continuous four-node Executive Operating Envelope connects Commitments -> Constraints -> Decisions -> Learning -> Commitments with directional flow and scenario-specific degradation. The résumé and cover letter use the verified phone, email, LinkedIn, location, and campaign URL in HTML and generated PDF output; résumé page two remains attributable and actionable. Exact pagination, responsive document reflow, live reciprocal links, reduced motion, brand fidelity, and live byte equivalence passed.
          EOF
          python3 - <<PY
          import json
          from pathlib import Path
          p=Path('campaign-metadata.json'); d=json.loads(p.read_text())
          d['campaign_state']='complete'; d['audited_implementation_head']='$implementation_head'; d['live_verification_run_id']='$GITHUB_RUN_ID'; d['hero_animation_version']='continuous-four-node-loop-v2'; d['contact_information']='verified-html-and-pdf'
          p.write_text(json.dumps(d,indent=2)+'\n')
          p=Path('artifact-manifest.json'); d=json.loads(p.read_text())
          for item in ['contact-verification.json','contact-html-audit.json','final-live-audit.json']:
              if item not in d['audit_records']: d['audit_records'].append(item)
          p.write_text(json.dumps(d,indent=2)+'\n')
          p=Path('README.md'); t=p.read_text()
          contact='''\n## Verified contact information\n\nThe résumé and cover letter use the canonical RoleForge contact values in HTML and generated PDF output: Pittsburgh, Pennsylvania; 412.287.8640; russelldudek@gmail.com; linkedin.com/in/russelldudek; and the Westinghouse campaign URL. The résumé repeats the complete contact block on page two. Tablet and mobile document routes reflow without horizontal overflow while print retains exact US Letter geometry.\n'''
          if '## Verified contact information' not in t: t=t.replace('## Brand relationship',contact+'\n## Brand relationship')
          p.write_text(t)
          PY
          printf 'ROLEFORGE-WESTINGHOUSE-FINAL-%s\n' "$GITHUB_RUN_ID" > deployment-proof.txt
          rm -rf contact-audit
          rm -f final-audit-run-id.txt
          rm -f .github/workflows/final-live-contact-and-hero-audit.yml
          git config user.name 'RoleForge Final Auditor'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Finalize live hero and contact-complete document audit'
          git push origin HEAD:main

      - name: Verify final proof is live
        shell: bash
        run: |
          set -euo pipefail
          expected="ROLEFORGE-WESTINGHOUSE-FINAL-$GITHUB_RUN_ID"
          for attempt in $(seq 1 60); do
            live=$(curl -fsSL "https://russelldudek.github.io/Westinghouse/deployment-proof.txt?v=$GITHUB_RUN_ID-$attempt" || true)
            [ "$live" = "$expected" ] && exit 0
            sleep 10
          done
          exit 1
