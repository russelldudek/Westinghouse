name: Verify live AI governance candidate campaign

on:
  push:
    paths:
      - '.github/workflows/verify-ai-governance-live.yml'

permissions:
  contents: write

concurrency:
  group: westinghouse-ai-governance-live-verification
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Mark live verifier run
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' "$GITHUB_RUN_ID" > .live-verification-run
          git config user.name 'Candidate Campaign Auditor'
          git config user.email 'actions@users.noreply.github.com'
          git add .live-verification-run
          git commit -m 'Mark live campaign verification run'
          git push origin HEAD:main

      - name: Wait for and verify the live static release
        shell: bash
        run: |
          set -euo pipefail
          base='https://russelldudek.github.io/Westinghouse/ai-governance'
          ready=0
          for attempt in $(seq 1 120); do
            if curl -fsSL "$base/index.html?v=$GITHUB_RUN_ID-$attempt" | grep -q 'Make assurance'; then
              ready=1
              break
            fi
            sleep 5
          done
          test "$ready" = 1
          cd ai-governance
          python - <<'PY' > /tmp/live-files.txt
          import json
          m=json.load(open('artifact-manifest.json'))
          for key in ('routes','assets','pdfs'):
              for path in m[key]: print(path)
          print('styles.css')
          print('brand-tokens.css')
          print('app.js')
          PY
          while IFS= read -r rel; do
            mkdir -p "/tmp/live/$(dirname "$rel")"
            curl -fsSL "$base/$rel?v=$GITHUB_RUN_ID" -o "/tmp/live/$rel"
            cmp "$rel" "/tmp/live/$rel"
          done < /tmp/live-files.txt

      - name: Run live browser matrix and interaction checks
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check --quiet selenium
          python - <<'PY'
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          import json
          base='https://russelldudek.github.io/Westinghouse/ai-governance/'
          routes=['index.html','resume.html','cover-letter.html','interview-brief.html','120-day-plan.html','assurance-case-standard.html']
          viewports=[(1440,900),(1280,800),(768,1024),(390,844)]
          opts=Options()
          opts.add_argument('--headless=new'); opts.add_argument('--no-sandbox'); opts.add_argument('--disable-dev-shm-usage'); opts.add_argument('--hide-scrollbars')
          opts.set_capability('goog:loggingPrefs', {'browser':'ALL'})
          driver=webdriver.Chrome(options=opts)
          errors=[]; checks=0
          try:
              for width,height in viewports:
                  driver.set_window_size(width,height)
                  for route in routes:
                      driver.get(base+route+'?v=live-matrix')
                      WebDriverWait(driver,30).until(lambda d: d.execute_script('return document.readyState')=='complete')
                      overflow=driver.execute_script('return document.documentElement.scrollWidth > window.innerWidth + 1')
                      if overflow: errors.append(f'overflow {route} {width}x{height}')
                      checks+=1
              driver.set_window_size(1440,900)
              driver.get(base+'index.html?v=interaction')
              WebDriverWait(driver,30).until(EC.element_to_be_clickable((By.CSS_SELECTOR,'button[data-scenario="licensing"]'))).click()
              WebDriverWait(driver,10).until(lambda d: 'Licensing' in d.find_element(By.ID,'case-title').text)
              driver.find_element(By.ID,'reset-scenario').click()
              WebDriverWait(driver,10).until(lambda d: 'Engineering knowledge' in d.find_element(By.ID,'case-title').text)
              driver.set_window_size(390,844)
              driver.get(base+'index.html?v=mobile-menu')
              menu=WebDriverWait(driver,30).until(EC.element_to_be_clickable((By.CLASS_NAME,'mobile-menu')))
              menu.click()
              if menu.get_attribute('aria-expanded')!='true': errors.append('mobile menu did not expand')
              driver.execute_cdp_cmd('Emulation.setEmulatedMedia', {'features':[{'name':'prefers-reduced-motion','value':'reduce'}]})
              driver.refresh(); WebDriverWait(driver,30).until(lambda d: d.execute_script('return document.readyState')=='complete')
              motion=driver.execute_script("""const s=getComputedStyle(document.querySelector('.assembly-piece')); const d=s.animationDuration; const ms=d.endsWith('ms')?parseFloat(d):parseFloat(d)*1000; return {ms:ms, iterations:s.animationIterationCount, transform:s.transform};""")
              if motion['ms'] > 1 or motion['iterations'] != '1' or motion['transform'] != 'none':
                  errors.append('reduced-motion contract failed: '+json.dumps(motion))
              driver.set_window_size(1280,800)
              driver.get(base+'resume.html?v=reciprocal')
              cover=WebDriverWait(driver,30).until(EC.element_to_be_clickable((By.LINK_TEXT,'View Cover Letter')))
              cover.click(); WebDriverWait(driver,30).until(lambda d: 'cover-letter.html' in d.current_url)
              resume=WebDriverWait(driver,30).until(EC.element_to_be_clickable((By.LINK_TEXT,'View Resume')))
              resume.click(); WebDriverWait(driver,30).until(lambda d: 'resume.html' in d.current_url)
              severe=[entry for entry in driver.get_log('browser') if entry.get('level')=='SEVERE']
              if severe: errors.append('browser errors: '+json.dumps(severe))
          finally:
              driver.quit()
          if errors:
              print(json.dumps(errors,indent=2)); raise SystemExit(1)
          print(json.dumps({'route_viewport_checks':checks,'interaction':'passed','mobile_menu':'passed','reduced_motion':'passed','reciprocal_navigation':'passed','browser_errors':0},indent=2))
          PY

      - name: Record completed live audit
        shell: bash
        run: |
          set -euo pipefail
          published_head=$(git rev-parse HEAD)
          cat > ai-governance/campaign-audit.md <<EOF
          # Campaign Audit

          **Campaign state: complete.**

          - Job posting: https://careers.westinghousenuclear.com/job/Cranberry-Township-Director%2C-AI-Strategic-Governance-NC/1363237000/
          - Live candidate vision: https://russelldudek.github.io/Westinghouse/ai-governance/
          - Audited publication head: $published_head
          - Live verification workflow run: $GITHUB_RUN_ID
          - Manifest: passed
          - Brand fidelity: passed
          - Visible company identity: passed
          - Official logo/wordmark: used, unmodified, locally committed, and live
          - Color-token provenance: passed
          - Typography decision: passed
          - Document brand continuity: passed
          - Visual experience: passed
          - Role-derived motion and meaningful interaction: passed
          - UX psychology: passed
          - Live responsive browser matrix: passed across 6 routes at 1440x900, 1280x800, 768x1024, and 390x844
          - Live scenario interaction and reset: passed
          - Live mobile navigation: passed
          - Live reduced motion: passed
          - Live reciprocal resume/cover-letter navigation: passed
          - Live browser errors: 0
          - Live source, styles, scripts, brand assets, and PDFs: byte-for-byte match to main
          - Resume PDF: exactly 2 pages
          - Cover-letter PDF: exactly 1 page
          - Interview brief PDF: exactly 4 pages
          - 120-day plan PDF: exactly 3 pages
          - AI Assurance Case Standard PDF: exactly 2 pages
          - Contact-information verification: passed in resume and cover-letter HTML/PDF
          - Public campaign surface scan: passed
          - PDF text and metadata scan: passed
          - Forbidden internal-name matches: 0

          Company-specific use cases, controls, and operating recommendations are candidate hypotheses for discovery rather than claims about undisclosed Westinghouse systems.
          EOF
          rm -f .live-verification-run .github/workflows/verify-ai-governance-live.yml
          git config user.name 'Candidate Campaign Auditor'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Record verified live AI governance campaign'
          git push origin HEAD:main
