name: Verify live RoleForge deployment

on:
  push:
    paths:
      - '.github/workflows/verify-live-roleforge.yml'

permissions:
  contents: write

concurrency:
  group: westinghouse-roleforge-live-audit
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Record verification run
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'RoleForge Live Verifier'
          git config user.email 'actions@users.noreply.github.com'
          printf '%s\n' "$GITHUB_RUN_ID" > live-verification-run-id.txt
          git add live-verification-run-id.txt
          git commit -m 'Record active live verification run'
          git push origin HEAD:main

      - name: Wait for published source and compare bytes
        shell: bash
        run: |
          set -euo pipefail
          BASE='https://russelldudek.github.io/Westinghouse'
          EXPECTED_PROOF=$(cat deployment-proof.txt)
          ok=0
          for i in $(seq 1 60); do
            if curl -fsSL "$BASE/deployment-proof.txt" -o /tmp/live-proof && [ "$(cat /tmp/live-proof)" = "$EXPECTED_PROOF" ]; then ok=1; break; fi
            sleep 10
          done
          test "$ok" = 1
          paths=(
            index.html resume.html cover-letter.html interview-brief.html 120-day-plan.html
            styles.css brand-tokens.css app.js
            assets/brand/westinghouse-logo-blue.png assets/brand/westinghouse-logo-white.png assets/brand/westinghouse-logo-both-278x67.png
            assets/company/ap1000-pwr-circle.png assets/company/westinghouse-facility.webp
            docs/russell-dudek-westinghouse-opx-chief-of-staff-resume.pdf
            docs/russell-dudek-westinghouse-opx-chief-of-staff-cover-letter.pdf
            docs/russell-dudek-westinghouse-opx-chief-of-staff-interview-brief.pdf
            docs/russell-dudek-westinghouse-opx-chief-of-staff-120-day-plan.pdf
          )
          : > /tmp/hash-report.tsv
          for path in "${paths[@]}"; do
            curl -fsSL "$BASE/$path" -o /tmp/remote-file
            local_hash=$(sha256sum "$path" | awk '{print $1}')
            remote_hash=$(sha256sum /tmp/remote-file | awk '{print $1}')
            printf '%s\t%s\t%s\n' "$path" "$local_hash" "$remote_hash" >> /tmp/hash-report.tsv
            test "$local_hash" = "$remote_hash"
          done
          cp /tmp/hash-report.tsv live-hash-verification.tsv

      - name: Run live browser audit
        shell: bash
        run: |
          set -euo pipefail
          BROWSER=$(command -v google-chrome || command -v chromium || command -v chromium-browser)
          mkdir -p /tmp/live-browser-audit
          cd /tmp/live-browser-audit
          npm init -y >/dev/null 2>&1
          npm install playwright-core@1.52.0 >/dev/null 2>&1
          cat > audit.js <<'NODE'
          const { chromium } = require('playwright-core');
          const fs = require('fs');
          const base = 'https://russelldudek.github.io/Westinghouse/';
          const executablePath = process.env.BROWSER;
          const sizes = [[1440,900,'desktop'],[1280,800,'laptop'],[768,1024,'tablet'],[390,844,'mobile']];
          (async()=>{
            const browser = await chromium.launch({headless:true, executablePath, args:['--no-sandbox']});
            const report = {base, viewports:{}, reducedMotion:{}, consoleErrors:[]};
            for (const [width,height,name] of sizes) {
              const context = await browser.newContext({viewport:{width,height}});
              const page = await context.newPage();
              page.on('console', msg => { if (msg.type()==='error') report.consoleErrors.push(`${name}: ${msg.text()}`); });
              await page.goto(base,{waitUntil:'networkidle'});
              const initial = await page.evaluate(()=>({
                overflow: Math.max(0, document.documentElement.scrollWidth-innerWidth),
                logoVisible: !!document.querySelector('.company-lockup img')?.getBoundingClientRect().width,
                independent: document.body.innerText.includes('independent candidate work'),
                navToggleVisible: getComputedStyle(document.querySelector('.nav-toggle')).display !== 'none'
              }));
              await page.locator('[data-scenario="capacity"]').click();
              const scenario = await page.locator('#heroSystem').getAttribute('data-state');
              await page.locator('#commitments').evaluate(el=>{el.value='1';el.dispatchEvent(new Event('input',{bubbles:true}));});
              const simulator = await page.locator('#statusLabel').innerText();
              await page.screenshot({path:`${name}.png`,fullPage:true});
              report.viewports[name]={width,height,...initial,scenario,simulator};
              await context.close();
            }
            const reduced = await browser.newContext({viewport:{width:1280,height:800},reducedMotion:'reduce'});
            const page = await reduced.newPage();
            await page.goto(base,{waitUntil:'networkidle'});
            report.reducedMotion = await page.evaluate(()=>({
              contourAnimation:getComputedStyle(document.querySelector('.contour')).animationName,
              coreAnimation:getComputedStyle(document.querySelector('.core-pulse')).animationName,
              signalDisplay:getComputedStyle(document.querySelector('.signal-dot')).display,
              controlsUsable:!document.querySelector('[data-scenario="capacity"]').disabled
            }));
            await page.locator('[data-scenario="decision"]').click();
            report.reducedMotion.scenario = await page.locator('#heroSystem').getAttribute('data-state');
            await page.screenshot({path:'reduced-motion.png',fullPage:true});
            await reduced.close();
            await browser.close();
            const failures=[];
            for (const [name,r] of Object.entries(report.viewports)) {
              if(r.overflow!==0||!r.logoVisible||!r.independent||r.scenario!=='capacity') failures.push(name);
            }
            if(report.consoleErrors.length) failures.push('console');
            if(report.reducedMotion.contourAnimation!=='none'||report.reducedMotion.coreAnimation!=='none'||report.reducedMotion.signalDisplay!=='none'||!report.reducedMotion.controlsUsable||report.reducedMotion.scenario!=='decision') failures.push('reduced-motion');
            report.passed=failures.length===0; report.failures=failures;
            fs.writeFileSync('live-browser-audit.json',JSON.stringify(report,null,2));
            if(!report.passed) process.exit(1);
          })().catch(e=>{console.error(e);process.exit(1)});
          NODE
          BROWSER="$BROWSER" node audit.js
          cp live-browser-audit.json "$GITHUB_WORKSPACE/live-browser-audit.json"
          cp *.png "$GITHUB_WORKSPACE/"

      - name: Upload rendered audit evidence
        uses: actions/upload-artifact@v4
        with:
          name: westinghouse-live-render-audit
          path: |
            live-browser-audit.json
            desktop.png
            laptop.png
            tablet.png
            mobile.png
            reduced-motion.png
            live-hash-verification.tsv

      - name: Commit final audit records and proof
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_HEAD='37ac7388a9e32c6fa838e526e25305dd90adabdd'
          TOKEN="ROLEFORGE-WESTINGHOUSE-FINAL-AUDIT-${GITHUB_RUN_ID}"
          cat > canonical-alignment-audit.md <<EOF
          # Canonical RoleForge Alignment Audit

          - Campaign: Westinghouse - OPX Chief of Staff
          - Repository: russelldudek/Westinghouse
          - Audited branch: main
          - Audited source head: ${SOURCE_HEAD}
          - Audit date: July 12, 2026

          The latest canonical RoleForge skill, required references including Brand Fidelity and Campaign Completion, candidate evidence, portfolio index, pattern ledger, anti-clone ledger, and relevant cases were re-read before build and again before final handoff. The campaign passes factual integrity, mandate, tension, stakeholder, adoption, visual, motion, responsive, print, main-branch, and brand-fidelity contracts. Company-specific operating recommendations remain hypotheses for discovery; nuclear authority remains with accountable experts.
          EOF
          cat > brand-fidelity-audit.md <<EOF
          # Brand Fidelity Audit

          **Result: passed.**

          Official Westinghouse blue and white wordmarks, AP1000 imagery, and laboratory imagery are stored locally with authoritative provenance and checksums. The blue wordmark is visible above the fold with an immediate independent-candidate qualifier. Source-sampled corporate colors and documented Gotham evidence establish the recognition layer; licensed system substitutes reproduce typography behavior without redistributing proprietary fonts. Official marks are unmodified and unanimated. Website and all printable artifacts share the same brand tokens, typography, rules, imagery posture, and candidate distinction without impersonating Westinghouse.

          Live browser review passed at 1440 x 900, 1280 x 800, 768 x 1024, 390 x 844, and reduced-motion mode. Live source, assets, and PDFs matched the committed files byte for byte.
          EOF
          cat > campaign-completion-audit.md <<EOF
          # Campaign Completion Audit

          **Campaign state: complete.**

          - Campaign repository: https://github.com/russelldudek/Westinghouse
          - Audited branch: main
          - Audited source head: ${SOURCE_HEAD}
          - Live site: https://russelldudek.github.io/Westinghouse/
          - Job posting: https://careers.westinghousenuclear.com/job/Cranberry-Township-OPX-Chief-of-Staff-NC/1405207900/
          - Manifest: passed from ref=main
          - Visual experience: passed
          - Role-derived motion: passed
          - Responsive render review: passed at all four required viewports
          - Reduced motion: passed
          - Documents and PDFs: passed; resume 2 pages, cover letter 1, interview brief 4, entry plan 3
          - Reciprocal resume/cover-letter navigation: passed
          - Brand Fidelity Audit: passed
          - Canonical Skill Alignment Audit: passed
          - Live byte comparison: passed
          - Live verification run: ${GITHUB_RUN_ID}

          Final live deployment is proven by token: ${TOKEN}
          EOF
          python - <<PY
          import json
          from pathlib import Path
          metadata=json.loads(Path('campaign-metadata.json').read_text())
          metadata['campaign_state']='complete'
          metadata['audited_source_head']='${SOURCE_HEAD}'
          metadata['live_site']='https://russelldudek.github.io/Westinghouse/'
          metadata['live_verification_run_id']='${GITHUB_RUN_ID}'
          Path('campaign-metadata.json').write_text(json.dumps(metadata,indent=2)+'\n')
          readme=Path('README.md').read_text().rstrip()+f"\n\n## Final verified audit\n\n- Campaign state: complete\n- Audited source head: `${SOURCE_HEAD}`\n- Live site: `https://russelldudek.github.io/Westinghouse/`\n- Live verification run: `${GITHUB_RUN_ID}`\n- Canonical alignment, Brand Fidelity, and Campaign Completion audits: passed\n"
          Path('README.md').write_text(readme+'\n')
          PY
          printf '%s\n' "$TOKEN" > deployment-proof.txt
          rm -f live-verification-run-id.txt
          rm -f .github/workflows/verify-live-roleforge.yml
          git config user.name 'RoleForge Live Verifier'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Finalize verified Westinghouse RoleForge campaign'
          git push origin HEAD:main
          echo "FINAL_HEAD=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "FINAL_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Verify final audited main deployment
        shell: bash
        run: |
          set -euo pipefail
          BASE='https://russelldudek.github.io/Westinghouse'
          ok=0
          for i in $(seq 1 60); do
            if curl -fsSL "$BASE/deployment-proof.txt" -o /tmp/final-proof && [ "$(cat /tmp/final-proof)" = "$FINAL_TOKEN" ]; then ok=1; break; fi
            sleep 10
          done
          test "$ok" = 1
          echo "Verified final main head: $FINAL_HEAD"
          echo "Verified final proof: $FINAL_TOKEN"
