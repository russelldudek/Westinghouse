name: Clean publication diagnostics

on:
  push:
    paths:
      - '.github/workflows/cleanup-publication-diagnostics.yml'

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Remove temporary publication diagnostics
        shell: bash
        run: |
          set -euo pipefail
          rm -f \
            .github/workflows/cleanup-publication-diagnostics.yml \
            .github/workflows/pages-api-diagnostic.yml \
            .pages-deployment-run \
            .pages-api-diagnostic.txt \
            .live-verification-run
          git config user.name 'Candidate Campaign Publisher'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Clean publication diagnostics'
          git push origin HEAD:main
