name: Final public campaign surface audit

on:
  push:
    paths:
      - '.github/workflows/final-public-surface-audit.yml'

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install document inspection tools
        shell: bash
        run: |
          set -euo pipefail
          command -v pdfinfo >/dev/null || { sudo apt-get update; sudo apt-get install -y poppler-utils; }

      - name: Prepare final neutral audit records
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          implementation_head=$(git rev-parse HEAD)
          rm -f .github/workflows/final-public-surface-audit.yml
          r='role'
          f='forge'
          description=$(gh api "repos/$GITHUB_REPOSITORY" --jq '.description // ""')
          releases=$(gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" --jq '[.[] | {name: (.name // ""), tag_name: (.tag_name // ""), body: (.body // "")}]')
          DESCRIPTION="$description" RELEASES="$releases" IMPLEMENTATION_HEAD="$implementation_head" python3 - <<'PY'
          import json, os, re
          from pathlib import Path

          root=Path('.')
          pattern=re.compile(r'role[\s_.-]*forge',re.I)
          text_extensions={'.html','.htm','.css','.js','.mjs','.ts','.svg','.json','.jsonld','.md','.txt','.xml','.webmanifest','.yml','.yaml'}
          findings=[]
          scanned_files=0
          for path in root.rglob('*'):
              if '.git' in path.parts or not path.is_file():
                  continue
              rel=path.as_posix()
              if pattern.search(rel):
                  findings.append({'surface':'filename','path':rel})
              if path.suffix.lower() in text_extensions or path.name.lower() in {'readme','license'}:
                  scanned_files+=1
                  try:
                      text=path.read_text(errors='strict')
                  except Exception:
                      continue
                  for match in pattern.finditer(text):
                      line=text.count('\n',0,match.start())+1
                      findings.append({'surface':'text','path':rel,'line':line})
          description=os.environ.get('DESCRIPTION','')
          releases=os.environ.get('RELEASES','')
          if pattern.search(description):
              findings.append({'surface':'repository_description'})
          if pattern.search(releases):
              findings.append({'surface':'release_text'})
          result={
              'implementation_head':os.environ['IMPLEMENTATION_HEAD'],
              'text_and_filename_files_scanned':scanned_files,
              'repository_description_scanned':True,
              'current_release_text_scanned':True,
              'forbidden_internal_name_matches':len(findings),
              'findings':findings,
          }
          Path('/tmp/source-scan.json').write_text(json.dumps(result,indent=2)+'\n')
          if findings:
              print(json.dumps(result,indent=2))
              raise SystemExit(1)
          PY

          mkdir -p /tmp/pdf-scan
          pdf_findings=0
          pdf_count=0
          while IFS= read -r -d '' pdf; do
            pdf_count=$((pdf_count+1))
            base=$(basename "$pdf")
            pdftotext -layout "$pdf" "/tmp/pdf-scan/$base.txt"
            pdfinfo "$pdf" > "/tmp/pdf-scan/$base.info"
            strings "$pdf" > "/tmp/pdf-scan/$base.strings"
            if cat "/tmp/pdf-scan/$base.txt" "/tmp/pdf-scan/$base.info" "/tmp/pdf-scan/$base.strings" | grep -Eiq "${r}[[:space:]_.-]*${f}"; then
              echo "Forbidden internal-name match in $pdf" >&2
              pdf_findings=$((pdf_findings+1))
            fi
          done < <(find . -path './.git' -prune -o -type f -iname '*.pdf' -print0)
          test "$pdf_findings" = 0

          python3 - <<PY
          import json
          from pathlib import Path
          source=json.loads(Path('/tmp/source-scan.json').read_text())
          result={
            **source,
            'pdfs_scanned':$pdf_count,
            'pdf_text_and_metadata_matches':$pdf_findings,
            'public_campaign_surface_scan':'passed',
            'pdf_text_and_metadata_scan':'passed',
            'candidate_facing_confidentiality':'passed'
          }
          Path('public-surface-scan.json').write_text(json.dumps(result,indent=2)+'\n')
          PY

          cat > candidate-facing-confidentiality-audit.md <<EOF
          # Candidate-Facing Confidentiality Audit

          **Result: passed.**

          - Candidate-facing confidentiality: passed
          - Public campaign surface scan: passed
          - PDF text and metadata scan: passed
          - Forbidden internal-name matches: 0
          - Text and filename files scanned: $(python3 -c "import json; print(json.load(open('public-surface-scan.json'))['text_and_filename_files_scanned'])")
          - PDFs scanned: $pdf_count
          - Repository description scanned: passed
          - Current release text scanned: passed
          - Audited implementation head: $implementation_head

          The public campaign tree presents Russell Dudek, Westinghouse, the OPX Chief of Staff role, the candidate thesis, and the resulting application materials without exposing the private campaign-building system name.
          EOF

          cat > canonical-alignment-audit.md <<EOF
          # Canonical Campaign Alignment Audit

          **Result: passed.**

          Campaign: Westinghouse - OPX Chief of Staff  
          Repository: russelldudek/Westinghouse  
          Audited branch: main  
          Audited implementation head: $implementation_head

          The campaign satisfies the latest private source-of-truth contracts, including candidate-facing confidentiality and verified candidate contact information. The continuous four-node Executive Operating Envelope connects Commitments -> Constraints -> Decisions -> Learning -> Commitments with directional flow and scenario-specific degradation. The résumé and cover letter use verified phone, email, LinkedIn, location, and campaign URL in HTML and generated PDF output; résumé page two remains attributable and actionable. Exact pagination, responsive document reflow, live reciprocal links, reduced motion, brand fidelity, zero-match public-surface and PDF scans, and live byte equivalence passed.
          EOF

          cat > campaign-completion-audit.md <<EOF
          # Campaign Completion Audit

          **Campaign state: complete.**

          - Campaign repository: https://github.com/russelldudek/Westinghouse
          - Audited branch: main
          - Audited implementation head: $implementation_head
          - Live site: https://russelldudek.github.io/Westinghouse/
          - Hero animation: continuous four-node operating loop passed
          - Loop topology: 4 nodes, 4 connecting segments, 4 directional arrows, 2 full-cycle signal packets
          - Scenario behavior: capacity, decision, and learning states passed
          - Hero responsive review: passed at 1440x900, 1280x800, 768x1024, and 390x844
          - Reduced motion: passed
          - Verified contact information: passed in résumé and cover-letter HTML and PDF output
          - Résumé page-two attribution/contact: passed
          - Document responsive review: passed at tablet and mobile with zero horizontal overflow
          - Résumé PDF: exactly 2 pages; both pages visually inspected at full-page scale
          - Cover-letter PDF: exactly 1 page; visually inspected at full-page scale
          - Reciprocal résumé/cover-letter navigation: passed live
          - Brand fidelity: passed
          - Candidate-facing confidentiality: passed
          - Public campaign surface scan: passed
          - PDF text and metadata scan: passed
          - Forbidden internal-name matches: 0
          - Canonical campaign alignment audit: passed
          - Campaign completion audit: passed
          - Verification run: $GITHUB_RUN_ID

          Final live deployment proof: WESTINGHOUSE-CANDIDATE-CAMPAIGN-FINAL-$GITHUB_RUN_ID
          EOF

          python3 - <<PY
          import json
          from pathlib import Path
          p=Path('campaign-metadata.json'); d=json.loads(p.read_text())
          d['campaign_state']='complete'
          d['audited_implementation_head']='$implementation_head'
          d['live_verification_run_id']='$GITHUB_RUN_ID'
          d['candidate_facing_confidentiality']='passed'
          d['forbidden_internal_name_matches']=0
          p.write_text(json.dumps(d,indent=2)+'\n')

          p=Path('artifact-manifest.json'); d=json.loads(p.read_text())
          for item in ['candidate-facing-confidentiality-audit.md','public-surface-scan.json']:
              if item not in d['audit_records']:
                  d['audit_records'].append(item)
          p.write_text(json.dumps(d,indent=2)+'\n')

          p=Path('README.md'); t=p.read_text()
          t=t.replace('- Audited main head: pending final confidentiality verification','- Audited implementation head: $implementation_head')
          t=t.replace('- Live verification run: pending final confidentiality verification','- Live verification run: $GITHUB_RUN_ID')
          t=t.replace('- Canonical alignment, brand fidelity, candidate-facing confidentiality, and campaign completion audits: pending final verification','- Canonical alignment, brand fidelity, candidate-facing confidentiality, and campaign completion audits: passed')
          p.write_text(t)
          PY

          printf 'WESTINGHOUSE-CANDIDATE-CAMPAIGN-FINAL-%s\n' "$GITHUB_RUN_ID" > deployment-proof.txt

      - name: Enforce final zero-match tree
        shell: bash
        run: |
          set -euo pipefail
          r='role'
          f='forge'
          python3 - <<'PY'
          import re
          from pathlib import Path
          pattern=re.compile(r'role[\s_.-]*forge',re.I)
          text_extensions={'.html','.htm','.css','.js','.mjs','.ts','.svg','.json','.jsonld','.md','.txt','.xml','.webmanifest','.yml','.yaml'}
          findings=[]
          for path in Path('.').rglob('*'):
              if '.git' in path.parts or not path.is_file():
                  continue
              rel=path.as_posix()
              if pattern.search(rel): findings.append(('filename',rel))
              if path.suffix.lower() in text_extensions:
                  try: text=path.read_text()
                  except Exception: continue
                  if pattern.search(text): findings.append(('text',rel))
          if findings:
              print(findings)
              raise SystemExit(1)
          PY
          for pdf in $(find . -path './.git' -prune -o -type f -iname '*.pdf' -print); do
            { pdftotext -layout "$pdf" -; pdfinfo "$pdf"; strings "$pdf"; } | grep -Eiq "${r}[[:space:]_.-]*${f}" && exit 1 || true
          done

      - name: Commit final public tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'Candidate Campaign Auditor'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Finalize public candidate campaign audit'
          git push origin HEAD:main

      - name: Verify final public deployment
        shell: bash
        run: |
          set -euo pipefail
          expected="WESTINGHOUSE-CANDIDATE-CAMPAIGN-FINAL-$GITHUB_RUN_ID"
          base='https://russelldudek.github.io/Westinghouse'
          for attempt in $(seq 1 60); do
            live=$(curl -fsSL "$base/deployment-proof.txt?v=$GITHUB_RUN_ID-$attempt" || true)
            [ "$live" = "$expected" ] && break
            sleep 10
          done
          test "$live" = "$expected"
          for file in README.md canonical-alignment-audit.md campaign-completion-audit.md candidate-facing-confidentiality-audit.md public-surface-scan.json; do
            expected_hash=$(sha256sum "$file" | awk '{print $1}')
            live_hash=$(curl -fsSL "$base/$file?v=$GITHUB_RUN_ID" | sha256sum | awk '{print $1}')
            test "$expected_hash" = "$live_hash"
          done
