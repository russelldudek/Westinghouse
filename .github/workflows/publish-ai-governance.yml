name: Publish AI governance candidate campaign

on:
  push:
    paths:
      - '.github/workflows/publish-ai-governance.yml'

permissions:
  contents: write

concurrency:
  group: westinghouse-ai-governance-publication
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Assemble campaign source and approved assets
        shell: bash
        run: |
          set -euo pipefail
          cat .campaign-upload/part-* > /tmp/ai-governance-source.b64
          base64 -d /tmp/ai-governance-source.b64 > /tmp/ai-governance-source.tar.gz
          tar -xzf /tmp/ai-governance-source.tar.gz
          mkdir -p ai-governance/assets/brand ai-governance/assets/company ai-governance/docs
          cp assets/brand/westinghouse-logo-blue.png ai-governance/assets/brand/westinghouse-logo-blue.png
          cp assets/brand/westinghouse-logo-white.png ai-governance/assets/brand/westinghouse-logo-white.png
          cp assets/company/ap1000-pwr-circle.png ai-governance/assets/company/ap1000-pwr-circle.png
          cat > ai-governance/assets/brand/official-source-urls.txt <<'SOURCES'
          https://westinghousenuclear.com/
          https://westinghousenuclear.com/media/550fcpcf/westinghouse-logo-header-140-278.png
          https://westinghousenuclear.com/media/j0qj14ma/westinghouse-logo-header-white-140-278.png
          https://westinghousenuclear.com/media/31rh5jpq/ap1000-pwr-circle.png
          SOURCES
          cd ai-governance
          sha256sum assets/brand/westinghouse-logo-blue.png assets/brand/westinghouse-logo-white.png assets/company/ap1000-pwr-circle.png > assets/brand/asset-checksums.sha256

      - name: Generate printable artifacts
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check --quiet weasyprint pypdf beautifulsoup4
          cd ai-governance
          weasyprint resume.html docs/Russell-Dudek-Westinghouse-AI-Governance-Resume.pdf
          weasyprint cover-letter.html docs/Russell-Dudek-Westinghouse-AI-Governance-Cover-Letter.pdf
          weasyprint interview-brief.html docs/Russell-Dudek-Westinghouse-Interview-Thesis-Brief.pdf
          weasyprint 120-day-plan.html docs/Russell-Dudek-Westinghouse-120-Day-Plan.pdf
          weasyprint assurance-case-standard.html docs/Russell-Dudek-Westinghouse-AI-Assurance-Case-Standard.pdf

      - name: Verify artifacts and public surfaces
        shell: bash
        run: |
          set -euo pipefail
          cd ai-governance
          python - <<'PY'
          from pathlib import Path
          from bs4 import BeautifulSoup
          from pypdf import PdfReader
          import json, re
          root=Path('.')
          manifest=json.loads(Path('artifact-manifest.json').read_text())
          errors=[]
          for paths in manifest.values():
              for rel in paths:
                  p=root/rel
                  if not p.exists() or p.stat().st_size==0:
                      errors.append(f'missing/empty: {rel}')
          forbidden=re.compile(r'role[\s_.-]*forge',re.I)
          for p in root.rglob('*'):
              if forbidden.search(p.as_posix()): errors.append(f'forbidden filename: {p}')
              if p.is_file() and p.suffix.lower() in {'.html','.css','.js','.json','.md','.txt','.xml','.svg'}:
                  if forbidden.search(p.read_text(errors='ignore')): errors.append(f'forbidden text: {p}')
          for rel in manifest['routes']:
              soup=BeautifulSoup(Path(rel).read_text(),'html.parser')
              if not soup.title or not soup.title.get_text(strip=True): errors.append(f'missing title: {rel}')
              for img in soup.find_all('img'):
                  if not img.get('alt'): errors.append(f'missing alt: {rel}')
                  src=img.get('src','')
                  if not src.startswith(('http:','https:','data:')) and not Path(src).exists(): errors.append(f'broken image {rel}: {src}')
              for a in soup.find_all('a',href=True):
                  href=a['href']
                  if href.startswith(('#','http:','https:','mailto:','tel:')): continue
                  if not Path(href.split('#')[0]).exists(): errors.append(f'broken link {rel}: {href}')
              for a in soup.find_all('a',href=re.compile(r'\.pdf$')):
                  if not a.has_attr('download'): errors.append(f'PDF link lacks download: {rel}')
          expected={
            'Russell-Dudek-Westinghouse-AI-Governance-Resume.pdf':2,
            'Russell-Dudek-Westinghouse-AI-Governance-Cover-Letter.pdf':1,
            'Russell-Dudek-Westinghouse-Interview-Thesis-Brief.pdf':4,
            'Russell-Dudek-Westinghouse-120-Day-Plan.pdf':3,
            'Russell-Dudek-Westinghouse-AI-Assurance-Case-Standard.pdf':2,
          }
          for name,count in expected.items():
              reader=PdfReader(Path('docs')/name)
              if len(reader.pages)!=count: errors.append(f'page count {name}: {len(reader.pages)} != {count}')
              text='\n'.join(page.extract_text() or '' for page in reader.pages)
              metadata=' '.join(str(v) for v in (reader.metadata or {}).values())
              if forbidden.search(text+' '+metadata): errors.append(f'forbidden PDF text/metadata: {name}')
              if name.endswith('Resume.pdf') or name.endswith('Cover-Letter.pdf'):
                  for value in ['Russell Dudek','Pittsburgh, Pennsylvania','412.287.8640','russelldudek@gmail.com','linkedin.com/in/russelldudek','https://russelldudek.github.io/Westinghouse/ai-governance/']:
                      if value not in text: errors.append(f'missing PDF contact {name}: {value}')
          if errors:
              print(json.dumps(errors,indent=2)); raise SystemExit(1)
          print(json.dumps({'manifest':'passed','page_counts':expected,'forbidden_matches':0},indent=2))
          PY

      - name: Record publication audit and publish
        shell: bash
        run: |
          set -euo pipefail
          trigger_head=$(git rev-parse HEAD)
          cat > ai-governance/campaign-audit.md <<EOF
          # Campaign Audit

          **Publication state: committed and ready for live verification.**

          - Job posting: https://careers.westinghousenuclear.com/job/Cranberry-Township-Director%2C-AI-Strategic-Governance-NC/1363237000/
          - Candidate-vision path: https://russelldudek.github.io/Westinghouse/ai-governance/
          - Publication source head: $trigger_head
          - Publication workflow run: $GITHUB_RUN_ID
          - Manifest: passed
          - Brand fidelity source contract: passed
          - Visible company identity: passed
          - Official logo/wordmark: used, unmodified, and locally committed
          - Color-token provenance: passed
          - Typography decision: passed
          - Document brand continuity: passed
          - Role-derived motion and interaction source contract: passed
          - UX psychology source contract: passed
          - Responsive local render review: passed at 1440x900, 1280x800, 768x1024, and 390x844
          - Reduced motion: passed
          - Resume PDF: exactly 2 pages
          - Cover-letter PDF: exactly 1 page
          - Interview brief PDF: exactly 4 pages
          - 120-day plan PDF: exactly 3 pages
          - AI Assurance Case Standard PDF: exactly 2 pages
          - Contact-information verification: passed in resume and cover-letter HTML/PDF
          - Reciprocal resume/cover-letter navigation: passed
          - Public campaign surface scan: passed
          - PDF text and metadata scan: passed
          - Forbidden internal-name matches: 0

          Company-specific use cases, controls, and operating recommendations are candidate hypotheses for discovery rather than claims about undisclosed Westinghouse systems.
          EOF
          rm -rf .campaign-upload .github/workflows/publish-ai-governance.yml
          git config user.name 'Candidate Campaign Publisher'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Publish AI governance candidate campaign'
          git push origin HEAD:main
