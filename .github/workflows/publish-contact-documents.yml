name: Publish verified contact-complete documents

on:
  push:
    paths:
      - '.github/workflows/publish-contact-documents.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Record publication run
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'RoleForge Document Publisher'
          git config user.email 'actions@users.noreply.github.com'
          printf '%s\n' "$GITHUB_RUN_ID" > contact-publication-run-id.txt
          git add contact-publication-run-id.txt
          git commit -m 'Record contact document publication run'
          git push origin HEAD:main

      - name: Install tools
        shell: bash
        run: |
          set -euo pipefail
          command -v pdfinfo >/dev/null || { sudo apt-get update; sudo apt-get install -y poppler-utils; }
          python3 -m pip install --user playwright

      - name: Render and verify final documents
        shell: bash
        run: |
          set -euo pipefail
          BROWSER=$(command -v google-chrome || command -v chromium || command -v chromium-browser)
          python3 -m http.server 8765 --bind 127.0.0.1 >/tmp/http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID || true' EXIT
          sleep 2
          mkdir -p docs contact-audit/renders
          "$BROWSER" --headless --no-sandbox --disable-gpu --hide-scrollbars --no-pdf-header-footer --virtual-time-budget=3000 --print-to-pdf=docs/russell-dudek-westinghouse-opx-chief-of-staff-resume.pdf http://127.0.0.1:8765/resume.html >/tmp/resume.log 2>&1
          "$BROWSER" --headless --no-sandbox --disable-gpu --hide-scrollbars --no-pdf-header-footer --virtual-time-budget=3000 --print-to-pdf=docs/russell-dudek-westinghouse-opx-chief-of-staff-cover-letter.pdf http://127.0.0.1:8765/cover-letter.html >/tmp/cover.log 2>&1
          resume_pdf='docs/russell-dudek-westinghouse-opx-chief-of-staff-resume.pdf'
          cover_pdf='docs/russell-dudek-westinghouse-opx-chief-of-staff-cover-letter.pdf'
          resume_pages=$(pdfinfo "$resume_pdf" | awk '/^Pages:/ {print $2}')
          cover_pages=$(pdfinfo "$cover_pdf" | awk '/^Pages:/ {print $2}')
          test "$resume_pages" = 2
          test "$cover_pages" = 1
          pdftotext -layout "$resume_pdf" contact-audit/resume.txt
          pdftotext -layout "$cover_pdf" contact-audit/cover-letter.txt
          tr -d '\r\n ' < contact-audit/resume.txt > contact-audit/resume.compact.txt
          tr -d '\r\n ' < contact-audit/cover-letter.txt > contact-audit/cover-letter.compact.txt
          for value in '412.287.8640' 'russelldudek@gmail.com' 'linkedin.com/in/russelldudek' 'russelldudek.github.io/Westinghouse/'; do
            grep -Fq "$value" contact-audit/resume.compact.txt
            grep -Fq "$value" contact-audit/cover-letter.compact.txt
          done
          phone_count=$(grep -Fo '412.287.8640' contact-audit/resume.compact.txt | wc -l)
          email_count=$(grep -Fo 'russelldudek@gmail.com' contact-audit/resume.compact.txt | wc -l)
          linkedin_count=$(grep -Fo 'linkedin.com/in/russelldudek' contact-audit/resume.compact.txt | wc -l)
          campaign_count=$(grep -Fo 'russelldudek.github.io/Westinghouse/' contact-audit/resume.compact.txt | wc -l)
          test "$phone_count" -ge 2
          test "$email_count" -ge 2
          test "$linkedin_count" -ge 2
          test "$campaign_count" -ge 2
          pdftoppm -png -r 170 "$resume_pdf" contact-audit/renders/resume >/dev/null 2>&1
          pdftoppm -png -r 170 "$cover_pdf" contact-audit/renders/cover-letter >/dev/null 2>&1
          cat > contact-verification.json <<EOF
          {
            "run_id": "$GITHUB_RUN_ID",
            "resume_pages": $resume_pages,
            "cover_letter_pages": $cover_pages,
            "resume_contact_occurrences": {
              "phone": $phone_count,
              "email": $email_count,
              "linkedin": $linkedin_count,
              "campaign_url": $campaign_count
            },
            "required_values_verified_in_both_pdfs": true
          }
          EOF

      - name: Verify responsive HTML contact behavior
        shell: bash
        run: |
          set -euo pipefail
          export BROWSER_PATH=$(command -v google-chrome || command -v chromium || command -v chromium-browser)
          python3 -m http.server 8766 --bind 127.0.0.1 >/tmp/contact-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID || true' EXIT
          sleep 2
          cat > /tmp/contact_dom_audit.py <<'PY'
          import json, os
          from playwright.sync_api import sync_playwright

          required = ['412.287.8640','russelldudek@gmail.com','linkedin.com/in/russelldudek','russelldudek.github.io/Westinghouse/']
          report={'checks':[],'failures':[]}
          with sync_playwright() as p:
              browser=p.chromium.launch(executable_path=os.environ['BROWSER_PATH'],headless=True,args=['--no-sandbox'])
              for route in ['resume.html','cover-letter.html']:
                  for name,viewport in {'tablet':{'width':768,'height':1024},'mobile':{'width':390,'height':844}}.items():
                      context=browser.new_context(viewport=viewport); page=context.new_page()
                      page.goto(f'http://127.0.0.1:8766/{route}',wait_until='networkidle')
                      data=page.evaluate('''(required) => {
                        const blocks=[...document.querySelectorAll('.contact-block')];
                        const text=blocks.map(b=>b.textContent).join(' ');
                        const hrefs=blocks.flatMap(b=>[...b.querySelectorAll('a')].map(a=>a.getAttribute('href')));
                        return {
                          blocks: blocks.length,
                          visible: blocks.every(b=>getComputedStyle(b).display!=='none' && b.getBoundingClientRect().height>0),
                          overflow: document.documentElement.scrollWidth-document.documentElement.clientWidth,
                          values: Object.fromEntries(required.map(v=>[v,text.includes(v)])),
                          tel: hrefs.some(h=>h&&h.startsWith('tel:')),
                          mailto: hrefs.some(h=>h&&h.startsWith('mailto:')),
                          linkedin: hrefs.some(h=>h&&h.includes('linkedin.com/in/russelldudek')),
                          campaign: hrefs.some(h=>h&&h.includes('russelldudek.github.io/Westinghouse/'))
                        };
                      }''', required)
                      entry={'route':route,'viewport':name,**data}; report['checks'].append(entry)
                      if not data['visible'] or data['overflow']!=0 or not all(data['values'].values()) or not all([data['tel'],data['mailto'],data['linkedin'],data['campaign']]): report['failures'].append(entry)
                      context.close()
              browser.close()
          report['passed']=not report['failures']
          with open('contact-html-audit.json','w') as f: json.dump(report,f,indent=2); f.write('\n')
          if report['failures']: raise SystemExit(json.dumps(report['failures'],indent=2))
          PY
          python3 /tmp/contact_dom_audit.py

      - uses: actions/upload-artifact@v4
        with:
          name: westinghouse-contact-complete-documents
          path: |
            docs/russell-dudek-westinghouse-opx-chief-of-staff-resume.pdf
            docs/russell-dudek-westinghouse-opx-chief-of-staff-cover-letter.pdf
            contact-audit/
            contact-verification.json
            contact-html-audit.json

      - name: Commit regenerated documents
        shell: bash
        run: |
          set -euo pipefail
          cat > campaign-completion-audit.md <<EOF
          # Campaign Completion Audit

          **Campaign state: building.**

          The continuous four-node hero animation remains live and passed. The Candidate Contact Information Contract now passes source, responsive HTML, PDF text, and pagination checks:

          - résumé: exactly 2 pages;
          - cover letter: exactly 1 page;
          - verified phone, email, LinkedIn, location, and campaign URL present in both HTML and PDF output;
          - résumé contact block present on both pages;
          - tablet and mobile document views: zero horizontal overflow;
          - real tel, mailto, LinkedIn, and campaign links present in HTML.

          Remaining completion gates: visual inspection of all three regenerated PDF pages, live Pages byte verification, final canonical alignment audit, and portfolio-learning refresh.
          EOF
          rm -f contact-publication-run-id.txt contact-generation-diagnostic.txt
          rm -f .github/workflows/regenerate-contact-documents.yml .github/workflows/diagnose-contact-documents.yml .github/workflows/publish-contact-documents.yml
          git config user.name 'RoleForge Document Publisher'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Publish contact-complete resume and cover letter PDFs'
          git push origin HEAD:main
